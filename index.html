  }

  function canDismissTopPopup() {
    if (dialogueLocked || !isVisible("dim")) return false;
    if (isVisible("messagePopup")) return true;
    if (isVisible("settingsPopup")) return true;
    if (isVisible("cluePopup")) return cluePopupMode !== "present";
    if (isVisible("reasoningPopup")) return false;
    return false;
  }

  function updatePopupCloseButton() {
    const show = canDismissTopPopup();
    $("popupCloseButton").classList.toggle("hidden", !show);
    $("settingsButton").classList.toggle("hidden", show || currentMode !== "investigate");
  }

  function dismissTopPopup() {
    if (dialogueLocked) return;

    if (isVisible("messagePopup")) {
      playSfx("cancel");
      closeMessage();
      const hasPopupUnder = ["settingsPopup","choicePopup","cluePopup","reasoningPopup","clearPopup"].some(isVisible);
      $("dim").classList.toggle("hidden", !hasPopupUnder);
      return;
    }

    if (isVisible("settingsPopup")) {
      playSfx("cancel");
      $("settingsPopup").classList.add("hidden");
      $("dim").classList.add("hidden");
      return;
    }

    if (isVisible("cluePopup")) {
      if (cluePopupMode === "present") return;

      playSfx("cancel");
      closeCluePopup();
      returnToBase();
      return;
    }

    if (isVisible("reasoningPopup")) {
      return;
    }

    if (isVisible("choicePopup")) {
      return;
    }

    if (isVisible("clearPopup")) {
      playSfx("confirm");
      if (lastClearScore === 100) startTrueEnding();
      else goTitleAfterClear();
    }
  }

  function closeAllPopups() {
    stopClearResultAnimations();
    ["choicePopup","cluePopup","reasoningPopup","settingsPopup","messagePopup","clearPopup"].forEach(id => $(id).classList.add("hidden"));
    $("dim").classList.add("hidden");
    $("characterLayer").classList.add("hidden");
    ["mungCenter","doguriLeft","mungRight"].forEach(id => $(id).classList.add("hidden"));
    if (dialogueLocked) closeDialogue();
  }

  // Events
  $("startScreen").addEventListener("click", beginFromTitle);
  $("startPrimaryButton").addEventListener("click", (e) => {
    e.stopPropagation();
    const resume = state.runActive && !state.completed;
    if (resume) resumeFromInitial();
    else enterTitleFromInitial();
  });
  $("startNewButton").addEventListener("click", (e) => {
    e.stopPropagation();
    newGameConfirmFromSettings = false;
    const hasSavedProgress = state.runActive && !state.completed;
    if (!hasSavedProgress) {
      enterTitleFromInitial();
      return;
    }
    playSfx("popup");
    $("newGameConfirmDim").classList.remove("hidden");
    $("newGameConfirmPopup").classList.remove("hidden");
  });
  $("newGameCancelButton").addEventListener("click", () => {
    playSfx("cancel");
    newGameConfirmFromSettings = false;
    $("newGameConfirmPopup").classList.add("hidden");
    $("newGameConfirmDim").classList.add("hidden");
  });
  $("newGameConfirmButton").addEventListener("click", () => {
    const fromSettings = newGameConfirmFromSettings;
    newGameConfirmFromSettings = false;
    playSfx("confirm");
    pauseBgmForTitleGate();

    // 팝업과 기존 화면은 그대로 둔 채 먼저 검게 덮는다.
    // 완전히 어두워진 뒤에 초기화와 타이틀 화면 전환을 처리해
    // 이전 화면이 순간적으로 보이는 현상을 막는다.
    fadeToBlack(() => {
      $("newGameConfirmPopup").classList.add("hidden");
      $("newGameConfirmDim").classList.add("hidden");

      if (fromSettings) {
        closeAllPopups();
        setSceneVisible(false);
      }

      // 현재 회차만 초기화하므로 이상한 모자 해금/ON 상태는 유지된다.
      resetCurrentRun(false);

      $("initialScreen").classList.add("hidden");
      $("startScreen").classList.remove("hidden");
      $("startPrompt").classList.remove("hidden");
      currentMode = "title";

      clearTimeout(titleBgmTimer);
      titleBgmTimer = setTimeout(() => {
        titleBgmTimer = null;
        if (currentMode === "title" && !$("startScreen").classList.contains("hidden")) {
          playBgm("bgm_start.mp3");
        }
      }, 500);
    });
  });
  $("testResetButton").addEventListener("click", () => {
    playSfx("confirm");
    resetAllGameData();
  });
  $("testModeToggle").addEventListener("click", () => {
    playSfx("click");
    testModeEnabled = !testModeEnabled;
    if (!testModeEnabled && !state.strangeHatUnlocked) {
      state.strangeHatOn = false;
      saveState();
      applyStrangeHat();
    }
    updateTestModeControls();
  });
  $("testScoreSelect").addEventListener("change", () => {
    testModeScore = Number($("testScoreSelect").value) || 0;
    playSfx("flick");
  });

  $("introScreen").addEventListener("click", advanceIntro);
  $("dim").addEventListener("click", dismissTopPopup);
  $("popupCloseButton").querySelector("button").addEventListener("click", dismissTopPopup);

  const popupCloseObserver = new MutationObserver(updatePopupCloseButton);
  ["dim","messagePopup","settingsPopup","cluePopup","reasoningPopup","choicePopup","dialogueBlocker"].forEach(id => {
    popupCloseObserver.observe($(id), {attributes:true, attributeFilter:["class"]});
  });
  updatePopupCloseButton();

  $("noteButton").addEventListener("click", () => {
    playSfx("click");
    state.noteUpdated = false;
    saveState();
    updateMenuBadges();
    openCluePopup("view");
  });
  $("chatButton").addEventListener("click", () => {
    playSfx("click");
    state.chatUpdated = false;
    saveState();
    updateMenuBadges();
    if (testModeEnabled) {
      completeGameFromTestMode();
      return;
    }
    startRebuttal();
  });
  $("settingsButton").querySelector("button").addEventListener("click", openSettings);
  $("backButton").querySelector("button").addEventListener("click", () => { playSfx("cancel"); returnToBase(); });

  $("dialogueBox").addEventListener("click", advanceDialogue);
  $("dialogueBlocker").addEventListener("click", (e) => {
    e.preventDefault();
    e.stopPropagation();
    advanceDialogue();
  });

  $("clueConfirmButton").addEventListener("click", () => { playSfx("confirm"); closeCluePopup(); returnToBase(); });
  $("clueCancelButton").addEventListener("click", () => {
    playSfx("cancel");
    closeCluePopup();
    showChoice([
      {label:"지금 반박한다", action:beginObjection},
      {label:"조금 더 조사한다", cancel:true, action:returnToBase}
    ]);
  });
  $("cluePresentButton").addEventListener("click", submitEvidence);

  $("reasoningCancel").addEventListener("click", () => { playSfx("cancel"); cancelReasoning(true); });
  $("reasoningConfirm").addEventListener("click", (e) => {
    // 추리 완성 확인 버튼 자체는 별도의 클릭/확인 효과음을 재생하지 않는다.
    // 정답/오답 판정에 따른 결과 효과음은 submitReasoning 내부에서 그대로 처리한다.
    e.preventDefault();
    e.stopPropagation();
    submitReasoning();
  });
  document.addEventListener("pointermove", moveKeywordPointerDrag, {passive:false});
  document.addEventListener("pointerup", e => finishKeywordPointerDrag(e, false), {passive:false});
  document.addEventListener("pointercancel", e => finishKeywordPointerDrag(e, true), {passive:false});

  // PC에서는 시스템 커서를 완전히 숨기고 게임 커서 리소스를 직접 표시한다.
  document.addEventListener("pointermove", moveGameCursor, {passive:true});
  document.addEventListener("pointerdown", pressGameCursor, {passive:true});
  document.addEventListener("pointerup", releaseGameCursor, {passive:true});
  document.addEventListener("pointercancel", releaseGameCursor, {passive:true});
  document.addEventListener("pointerover", (e) => {
    if (e.pointerType && e.pointerType !== "mouse") return;
    moveGameCursor(e);
  }, {passive:true});
  document.addEventListener("pointerout", (e) => {
    if (e.pointerType && e.pointerType !== "mouse") return;
    if (e.relatedTarget) return;
    hideGameCursor();
  }, {passive:true});
  window.addEventListener("blur", () => {
    clearTimeout(gameCursorReleaseTimer);
    gameCursorReleaseTimer = null;
    gameCursorPressed = false;
    hideGameCursor();

    // 다른 브라우저 탭뿐 아니라 다른 앱/윈도우로 전환해도 BGM을 멈춘다.
    pauseBgmForBackground();
  });
  window.addEventListener("focus", resumeBgmFromBackground);

  $("titleButton").addEventListener("click", () => { playSfx("confirm"); goTitleFromSettings(); });
  $("settingsNewGameButton").addEventListener("click", () => {
    playSfx("popup");
    newGameConfirmFromSettings = true;
    $("newGameConfirmDim").classList.remove("hidden");
    $("newGameConfirmPopup").classList.remove("hidden");
  });
  $("hintMainButton").addEventListener("click", () => {
    playSfx("click");
    useHint();
  });
  $("strangeHatButton").addEventListener("click", () => {
    playSfx("confirm");
    if (!state.strangeHatUnlocked && !testModeEnabled) return;
    state.strangeHatOn = !state.strangeHatOn;
    saveState();
    applyStrangeHat();
  });

  $("clearConfirm").addEventListener("click", () => {
    if ($("clearConfirm").disabled || !$("clearActions").classList.contains("show")) return;
    playSfx("confirm");
    if (lastClearScore === 100) startTrueEnding();
    else goTitleAfterClear();
  });

  window.addEventListener("keydown", (e) => {
    if (e.code !== "Space") return;
    if (dialogueLocked) {
      e.preventDefault();
      advanceDialogue();
    } else if (currentMode === "intro") {
      e.preventDefault();
      advanceIntro();
    }
  });

  // Scene panning and empty-space investigation.
  $("sceneViewport").addEventListener("pointerdown", (e) => {
    if (currentMode !== "investigate" || dialogueLocked) return;
    drag.active = true;
    drag.moved = false;
    drag.startX = e.clientX;
    drag.startY = e.clientY;
    drag.startPanX = panX;
    drag.startPanY = panY;
    drag.startedOnClue = !!e.target.closest?.(".hotspot, #birdSprite");
    // 누르는 즉시 드래그 커서 상태로 전환한다.
    $("sceneViewport").classList.add("cursor-drag");
    // 시작한 요소가 포인터를 잡게 하면 단서 위에서도 드래그할 수 있고,
    // 거의 움직이지 않은 경우에는 기존 클릭 판정도 그대로 유지된다.
    e.target.setPointerCapture?.(e.pointerId);
  });
  $("sceneViewport").addEventListener("pointermove", (e) => {
    if (!drag.active || currentMode !== "investigate") return;
    const dx = e.clientX - drag.startX;
    const dy = e.clientY - drag.startY;
    if (Math.hypot(dx, dy) > 8 && !drag.moved) {
      drag.moved = true;
    }
    if (drag.moved) {
      panX = drag.startPanX + dx;
      panY = drag.startPanY + dy;
      clampPan();
    }
  });
  function finishSceneDrag(e) {
    if (!drag.active) return;
    const wasMoved = drag.moved;
    drag.active = false;
    $("sceneViewport").classList.remove("cursor-drag");
    $("sceneViewport").classList.toggle("cursor-investigate", currentMode === "investigate");
    setTimeout(() => { drag.moved = false; }, 0);
    if (!wasMoved && !drag.startedOnClue && e.type === "pointerup" && e.target === $("sceneViewport")) {
      openDialogue([{speaker:"도구리", text:"여긴… 아무것도 없는 것 같아.", thought:true}], {mode:"first", onComplete:()=>setMode("investigate")});
    }
  }
  $("sceneViewport").addEventListener("pointerup", finishSceneDrag);
  $("sceneViewport").addEventListener("pointercancel", finishSceneDrag);
  $("sceneInner").addEventListener("click", (e) => {
    if (dialogueLocked || drag.moved) return;
    const isEmptyScene = e.target === $("sceneBg") || e.target === $("sceneInner") || e.target === $("hotspotLayer");
    if (!isEmptyScene) return;

    if (currentMode === "investigate") {
      openDialogue([{speaker:"도구리", text:"여긴… 아무것도 없는 것 같아.", thought:true}], {mode:"first", onComplete:()=>setMode("investigate")});
    }
  });

  window.addEventListener("resize", resizeScene);
  window.addEventListener("resize", fitClearCommentToBubble);
  window.addEventListener("resize", updateClearInfoScale);
  window.addEventListener("resize", fitReasoningContentToViewport);
  window.addEventListener("resize", syncStartSubtitleToTitleImage);

  const startTitleResizeObserver = new ResizeObserver(syncStartSubtitleToTitleImage);
  startTitleResizeObserver.observe($("startTitle"));
  $("startTitle").addEventListener("load", syncStartSubtitleToTitleImage);
  window.addEventListener("beforeunload", saveState);
  document.addEventListener("visibilitychange", handleVisibilityChange);
  setInterval(() => { if (state.runActive) saveState(); }, 10000);

  // Prevent browser zoom gestures, long-press selection, and image dragging on mobile.
  const preventBrowserGesture = (e) => e.preventDefault();
  ["gesturestart", "gesturechange", "gestureend"].forEach(type => {
    document.addEventListener(type, preventBrowserGesture, {passive:false});
  });
  document.addEventListener("touchstart", e => {
    if (e.touches.length > 1) e.preventDefault();
  }, {passive:false});
  document.addEventListener("touchmove", e => {
    if (e.touches.length > 1) e.preventDefault();
  }, {passive:false});

  // iPad Safari는 dblclick 이벤트 전에 빠른 연속 탭을 스마트 줌으로 처리할 수 있다.
  // 같은 위치의 두 번째 touchend만 차단해 일반적인 한 번 탭은 그대로 유지한다.
  let lastTouchEndAt = 0;
  let lastTouchEndX = 0;
  let lastTouchEndY = 0;
  document.addEventListener("touchend", e => {
    if (e.touches.length > 0 || e.changedTouches.length !== 1) {
      lastTouchEndAt = 0;
      return;
    }

    const touch = e.changedTouches[0];
    const now = performance.now();
    const elapsed = now - lastTouchEndAt;
    const distance = Math.hypot(touch.clientX - lastTouchEndX, touch.clientY - lastTouchEndY);
    const isDoubleTap = elapsed > 0 && elapsed < 320 && distance < 36;

    if (isDoubleTap) {
      e.preventDefault();
      lastTouchEndAt = 0;
      return;
    }

    lastTouchEndAt = now;
    lastTouchEndX = touch.clientX;
    lastTouchEndY = touch.clientY;
  }, {passive:false, capture:true});

  document.addEventListener("selectstart", e => e.preventDefault());
  document.addEventListener("contextmenu", e => e.preventDefault());
  document.addEventListener("dragstart", e => {
    // 이미지와 추리 키워드의 브라우저 기본 드래그를 모두 차단한다.
    // 특히 키워드 네이티브 드래그는 시스템 커서를 다시 표시할 수 있다.
    if (e.target instanceof HTMLImageElement || (e.target instanceof Element && e.target.closest(".keyword-chip"))) {
      e.preventDefault();
    }
  });
  document.addEventListener("dblclick", e => e.preventDefault(), {passive:false});
  document.addEventListener("wheel", e => {
    if (e.ctrlKey) e.preventDefault();
  }, {passive:false});

  // Initialize
  preloadTrueEndingImages();
  buildTitleSnow();
  buildEndingSnow();
  buildHotspots();
  syncStartSubtitleToTitleImage();
  resizeScene();
  applyStrangeHat();
  updateMenuBadges();
  updateHotspots();
  updateTestModeControls();
  showInitialScreen();
})();
</script>
</body>
</html>
