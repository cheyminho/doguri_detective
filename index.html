<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0d" />
<title>명탐정 도구리</title>
<style>
  :root {
    --doguri: #f79f92;
    --mung: #e2a559;
    --panel: rgba(0, 0, 0, 0.72);
    --line: #6f6f6f;
    --ui: rgba(255, 255, 255, 0.96);
    --uiText: #151515;
    --radius: 24px;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #000;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    font-family: Arial, "Noto Sans KR", sans-serif;
    color: #fff;
    touch-action: none;
    cursor: url("images/cursor_default.png") 64 64, auto;
  }
  img {
    -webkit-user-drag: none;
    user-drag: none;
    -webkit-touch-callout: none;
  }
  #app, #app * {
    cursor: url("images/cursor_default.png") 64 64, auto;
  }
  #sceneViewport.cursor-investigate,
  #sceneViewport.cursor-investigate * {
    cursor: url("images/cursor_investigate.png") 64 64, auto;
  }
  #sceneViewport.cursor-drag,
  #sceneViewport.cursor-drag * {
    cursor: url("images/cursor_drag.png") 64 64, auto;
  }
  button, input { font: inherit; }
  button {
    border: 0;
    outline: 0;
  }
  button, .pressable {
    transform: scale(1);
    transition: transform 120ms ease;
  }
  @media (hover: hover) and (pointer: fine) {
    button:hover, .pressable:hover { transform: scale(1.055); }
  }
  button:active, .pressable:active { transform: scale(0.94); }

  #app {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: #000;
  }

  .hidden { display: none !important; }
  .serif { font-family: Georgia, "Times New Roman", "Noto Serif KR", serif; }

  /* Shared scene */
  #sceneViewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: #000;
    z-index: 1;
  }
  .scene-pan-arrow {
    position: absolute;
    z-index: 18;
    width: clamp(52px, 6vw, 96px);
    height: clamp(52px, 6vw, 96px);
    object-fit: contain;
    pointer-events: none;
    opacity: .92;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,.55));
  }
  #panArrowW { left: max(10px, env(safe-area-inset-left)); top: 50%; transform: translateY(-50%); }
  #panArrowE { right: max(10px, env(safe-area-inset-right)); top: 50%; transform: translateY(-50%); }
  #panArrowN { top: max(10px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); }
  #panArrowS { bottom: max(10px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); }
  #sceneInner {
    position: absolute;
    left: 0;
    top: 0;
    width: 1920px;
    height: 1080px;
    transform-origin: 0 0;
    will-change: transform;
  }
  #sceneBg, #windowClosed {
    position: absolute;
    display: block;
    pointer-events: none;
  }
  #sceneBg {
    inset: 0;
    width: 1920px;
    height: 1080px;
    object-fit: cover;
    object-position: center top;
  }
  #windowClosed {
    left: 848px;
    top: 10px;
    width: 512px;
    height: 512px;
    object-fit: contain;
    z-index: 3;
  }
  #hotspotLayer {
    position: absolute;
    inset: 0;
    z-index: 6;
  }
  .hotspot {
    position: absolute;
    background: transparent;
    border: 0;
    padding: 0;
  }
  .hotspot.debug { outline: 2px solid rgba(255, 0, 0, .5); background: rgba(255, 0, 0, .08); }

  #birdSprite {
    position: absolute;
    left: 1138px;
    top: 306px;
    width: 100px;
    height: 100px;
    background-image: url("images/bird.png");
    background-repeat: no-repeat;
    background-size: 400% 400%;
    z-index: 8;
    opacity: 0;
    transform: translate(-40px, -40px) scale(0);
    transform-origin: 50% 90%;
    pointer-events: none;
  }
  #birdSprite.active { pointer-events: auto; }

  .found-circle {
    position: absolute;
    width: 128px;
    height: 128px;
    margin-left: -64px;
    margin-top: -64px;
    background: url("images/foundcircle.png") center/contain no-repeat;
    z-index: 15;
    pointer-events: none;
    animation: foundPulse 3s both;
  }
  @keyframes foundPulse {
    0% { opacity: 0; transform: scale(.55); }
    10% { opacity: 1; transform: scale(1.12); }
    18% { transform: scale(1); }
    82% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(.7); }
  }

  /* Initial */
  #initialScreen {
    position: absolute;
    inset: 0;
    z-index: 110;
    background: #000;
  }
  #versionLabel {
    position: absolute;
    right: max(16px, calc(env(safe-area-inset-right) + 8px));
    bottom: max(14px, calc(env(safe-area-inset-bottom) + 8px));
    z-index: 2;
    color: #fff;
    font-size: clamp(14px, 1.3vw, 20px);
    font-weight: 700;
    letter-spacing: .04em;
    pointer-events: none;
  }
  #testResetButton {
    position: absolute;
    left: max(16px, calc(env(safe-area-inset-left) + 8px));
    bottom: calc(max(14px, calc(env(safe-area-inset-bottom) + 8px)) + 42px);
    z-index: 3;
    min-height: 34px;
    padding: 6px 10px;
    border: 1px solid rgba(0,0,0,.12);
    border-radius: 9px;
    background: #fff;
    color: #111;
    font-size: clamp(11px, .95vw, 14px);
    font-weight: 800;
  }
  #testModeControls {
    position: absolute;
    left: max(16px, calc(env(safe-area-inset-left) + 8px));
    bottom: max(14px, calc(env(safe-area-inset-bottom) + 8px));
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #testModeToggle,
  #testScoreSelect {
    min-height: 34px;
    padding: 6px 10px;
    border: 1px solid rgba(0,0,0,.12);
    border-radius: 9px;
    background: #fff;
    color: #111;
    font-size: clamp(11px, .95vw, 14px);
    font-weight: 800;
  }
  #testModeToggle {
    min-width: 108px;
  }
  #testScoreSelect {
    outline: 0;
    cursor: pointer;
    color-scheme: light;
  }
  #testScoreSelect option {
    background: #fff;
    color: #111;
  }
  #testScoreSelect:disabled {
    opacity: .38;
    cursor: default;
  }
  #newGameConfirmDim {
    position: absolute;
    inset: 0;
    z-index: 120;
    background: #000;
  }
  #newGameConfirmPopup {
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 121;
    transform: translate(-50%, -50%);
    width: min(94vw, 680px);
    padding: 26px;
    border-radius: 22px;
    background: rgba(0,0,0,.78);
    text-align: center;
  }
  #newGameConfirmPopup p {
    margin: 0;
    font-size: clamp(14px, 2vw, 28px);
    line-height: 1.55;
    white-space: nowrap;
  }
  #newGameConfirmPopup .popup-actions { margin-top: 22px; }

  /* Start */
  #startScreen {
    position: absolute;
    inset: 0;
    z-index: 100;
    overflow: hidden;
    background: #000;
  }
  #startBg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
  }
  #startTitleGroup {
    /*
      부제는 title.png의 실제 표시 너비에만 연동됩니다.
      아래 두 비율만 바꾸면 PC/모바일 공통으로 조정됩니다.
      0.048  = 타이틀 이미지 너비의 4.8% 크기
      -0.036 = 타이틀 이미지 너비의 -3.6%만큼 위로 이동
    */
    --subtitle-size-ratio: 0.07;
    --subtitle-y-ratio: -0.01;
    --subtitle-stroke-ratio: 0.0066;
    position: absolute;
    width: min(56vw, 760px);
    left: 50%;
    top: 3vh;
    transform: translateX(-50%);
    z-index: 5;
    text-align: center;
    pointer-events: none;
  }
  #startTitle {
    position: relative;
    z-index: 2;
    display: block;
    width: 100%;
    max-height: 34vh;
    object-fit: contain;
  }
  #startSubtitle {
    position: relative;
    z-index: 4;
    margin-top: calc(var(--title-image-width) * var(--subtitle-y-ratio));
    color: #f30603;
    font-family: Georgia, "Times New Roman", "Noto Serif KR", serif;
    font-size: calc(var(--title-image-width) * var(--subtitle-size-ratio));
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: .08em;
    white-space: nowrap;
    -webkit-text-stroke-width: calc(var(--title-image-width) * var(--subtitle-stroke-ratio));
    -webkit-text-stroke-color: #fff;
    paint-order: stroke fill;
    text-shadow: none;
  }
  #startDoguri {
    position: absolute;
    width: 84vh;
    height: 84vh;
    object-fit: contain;
    left: 50%;
    top: 73%;
    transform: translate(-50%, -50%);
    z-index: 2;
  }
  #startPrompt {
    position: absolute;
    left: 50%;
    bottom: max(8vh, calc(env(safe-area-inset-bottom) + 16px));
    transform: translateX(-50%);
    z-index: 3;
    isolation: isolate;
    font-size: clamp(20px, 2.5vw, 44px);
    font-weight: 400;
    letter-spacing: .04em;
    text-shadow: 0 2px 12px rgba(0,0,0,.8);
    animation: blink 2.4s cubic-bezier(.445, .05, .55, .95) infinite;
    white-space: nowrap;
  }
  #startPrompt::before {
    content: "";
    position: absolute;
    inset: -14px -28px;
    z-index: -1;
    border-radius: 50%;
    background: rgba(0,0,0,.10);
    filter: blur(14px);
    pointer-events: none;
  }
  @keyframes blink { 0%,100% { opacity: .25; } 50% { opacity: 1; } }

  #startActions {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    width: min(78vw, 360px);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .start-action-btn {
    width: 100%;
    min-height: 58px;
    padding: 13px 24px;
    border-radius: 18px;
    background: #fff;
    color: #000;
    font-size: clamp(18px, 2vw, 27px);
    font-weight: 800;
  }

  /* Intro */
  #introScreen {
    position: absolute;
    inset: 0;
    z-index: 95;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8vw;
    text-align: center;
  }
  #introText {
    max-width: 1100px;
    font-size: clamp(24px, 3.2vw, 54px);
    line-height: 1.65;
    opacity: 0;
    transition: opacity .6s ease;
  }
  #introText.show { opacity: 1; }

  /* Main UI */
  #mainUi {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  #bottomBar {
    position: absolute;
    left: 50%;
    bottom: max(18px, calc(env(safe-area-inset-bottom) + 45px));
    transform: translateX(-50%);
    display: flex;
    gap: clamp(14px, 2.3vw, 34px);
    pointer-events: auto;
  }
  .icon-wrap { position: relative; }
  .update-badge {
    position: absolute;
    top: -18px;
    right: -10px;
    z-index: 4;
    width: clamp(36px, 4vw, 64px);
    height: clamp(36px, 4vw, 64px);
    object-fit: contain;
    pointer-events: none;
  }
  .icon-btn {
    position: relative;
    width: clamp(68px, 7vw, 106px);
    height: clamp(68px, 7vw, 106px);
    border-radius: 0;
    background: transparent;
    padding: 0;
    overflow: visible;
  }
  .icon-btn > img:not(.update-badge) { width: 100%; height: 100%; object-fit: contain; }
  .tooltip {
    position: absolute;
    left: 50%;
    bottom: calc(100% + 24px);
    transform: translateX(-50%) translateY(6px);
    padding: 12px 19px;
    border-radius: 18px;
    background: #000;
    color: #fff;
    font-size: clamp(17px, 1.55vw, 23px);
    line-height: 1.2;
    font-weight: 700;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: .15s ease;
  }
  .tooltip::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 100%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 12px solid #000;
  }
  @media (hover: hover) and (pointer: fine) {
    .icon-wrap:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  #settingsButton,
  #popupCloseButton {
    position: absolute;
    right: max(16px, env(safe-area-inset-right));
    top: max(16px, env(safe-area-inset-top));
    pointer-events: auto;
  }
  #popupCloseButton {
    z-index: 60;
  }
  #backButton {
    position: absolute;
    left: max(16px, env(safe-area-inset-left));
    top: max(16px, env(safe-area-inset-top));
    z-index: 52;
    pointer-events: auto;
  }

  /* Dialogue */
  #characterLayer {
    position: absolute;
    inset: 0;
    z-index: 35;
    pointer-events: none;
  }
  .character {
    position: absolute;
    bottom: 30px;
    width: min(82vh, 920px);
    height: min(98vh, 1080px);
    object-fit: contain;
    object-position: center bottom;
    transition: opacity .18s ease;
  }
  #mungCenter { left: 50%; transform: translateX(-50%); }
  #doguriLeft { left: max(-2vw); height: min(80vh, 1000px); bottom: 40px;}
  #mungRight { right: max(-4vw); height: min(100vh, 1000px); bottom: 5px;}

  #dialogueBlocker {
    position: absolute;
    inset: 0;
    z-index: 60;
    background: transparent;
  }
  #dialogueBox {
    position: absolute;
    left: 0;
    right: 0;
    bottom: -6px;
    min-height: calc(clamp(150px, 23vh, 250px) + clamp(22px, 3vh, 40px) + 24px);
    z-index: 65;
    background: var(--panel);
    border-top: 2px solid var(--line);
    padding: 22px clamp(24px, 5vw, 90px) max(28px, calc(env(safe-area-inset-bottom) + 22px));
  }
  #speakerName {
    font-size: clamp(28px, 3vw, 46px);
    font-weight: 800;
    margin-bottom: 10px;
  }
  #speakerName.doguri { color: var(--doguri); }
  #speakerName.mung { color: var(--mung); }
  #dialogueText {
    font-size: clamp(22px, 2.4vw, 38px);
    line-height: 1.5;
    min-height: 1.5em;
    color: #fff;
  }
  #nextMark {
    position: absolute;
    right: clamp(18px, 5vw, 90px);
    bottom: max(26px, calc(env(safe-area-inset-bottom) + 22px));
    width: 46px;
    height: 46px;
    object-fit: contain;
    pointer-events: none;
    animation: bob .9s ease-in-out infinite;
  }
  @keyframes bob { 0%,100% { transform: translateX(0); } 50% { transform: translateX(3px); } }

  /* Dim, popup, choices */
  #dim {
    position: absolute;
    inset: 0;
    z-index: 40;
    background: rgba(0,0,0,.58);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
  }
  .popup {
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 50;
    transform: translate(-50%, -50%);
    width: min(88vw, 640px);
    max-height: 88vh;
    overflow: auto;
    background: rgba(0,0,0,.72);
    border-radius: var(--radius);
    padding: clamp(22px, 3.2vw, 42px);
  }
  .popup h2 {
    margin: 0 0 20px;
    font-size: clamp(26px, 3vw, 42px);
    text-align: center;
  }
  .popup p {
    margin: 12px 0;
    font-size: clamp(18px, 2vw, 28px);
    line-height: 1.55;
    text-align: center;
  }
  .choice-stack, .popup-actions {
    display: flex;
    gap: 14px;
  }
  .choice-stack { flex-direction: column; }
  .popup-actions {
    justify-content: center;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .choice-btn, .action-btn {
    min-height: 56px;
    padding: 13px 26px;
    border-radius: 18px;
    background: var(--ui);
    color: var(--uiText);
    font-weight: 800;
    font-size: clamp(18px, 2vw, 27px);
  }
  .choice-btn { width: 100%; }
  #cluePresentButton:disabled {
    opacity: .35;
    pointer-events: none;
    transform: none;
  }

  /* Toast */
  #toast {
    position: absolute;
    left: 50%;
    top: max(7vh, calc(env(safe-area-inset-top) + 22px));
    z-index: 90;
    transform: translateX(-50%) scale(.88);
    width: max-content;
    max-width: calc(100vw - 20px);
    padding: 14px 24px;
    border-radius: 18px;
    background: rgba(255,255,255,.96);
    color: #111;
    font-size: clamp(18px, 2vw, 28px);
    font-weight: 800;
    text-align: center;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transform-origin: center center;
    transition: opacity .18s cubic-bezier(.445, .05, .55, .95),
                transform .18s cubic-bezier(.445, .05, .55, .95);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) scale(1); }
  #toast.title-toast { z-index: 105; }

  /* Clue popup */
  #cluePopup {
    width: min(80vw, 1600px, calc((94vh - 118px) * 1.25));
    max-height: 94vh;
    overflow: hidden;
    padding: 0;
    background: transparent;
    border-radius: 0;
  }
  #clueGrid {
    display: grid;
    justify-content: center;
    gap: 0;
    width: 100%;
    margin: 0 auto;
  }
  .clue-cell {
    margin: 0px;
    position: relative;
    width: 94%;
    justify-self: center;
    aspect-ratio: 1;
    border-radius: 0;
    background: transparent;
    overflow: hidden;
    padding: 0;
  }
  @media (orientation: portrait) {
    #clueGrid { grid-template-columns: repeat(5, 20%); }
    .clue-cell:nth-child(5n + 1) { left: 18%; }
    .clue-cell:nth-child(5n + 2) { left: 9%; }
    .clue-cell:nth-child(5n + 3) { left: 0; }
    .clue-cell:nth-child(5n + 4) { left: -9%; }
    .clue-cell:nth-child(5n + 5) { left: -18%; }
  }
  @media (orientation: landscape) {
    #cluePopup {
      width: min(92vw, 1100px, calc((94vh - 118px) * 2.5));
    }
    #clueGrid { grid-template-columns: repeat(10, 10%); }
    .clue-cell:nth-child(10n + 1) { left: 90%; }
    .clue-cell:nth-child(10n + 2) { left: 70%; }
    .clue-cell:nth-child(10n + 3) { left: 50%; }
    .clue-cell:nth-child(10n + 4) { left: 30%; }
    .clue-cell:nth-child(10n + 5) { left: 10%; }
    .clue-cell:nth-child(10n + 6) { left: -10%; }
    .clue-cell:nth-child(10n + 7) { left: -30%; }
    .clue-cell:nth-child(10n + 8) { left: -50%; }
    .clue-cell:nth-child(10n + 9) { left: -70%; }
    .clue-cell:nth-child(10n + 10) { left: -90%; }
  }
  .clue-sprite, .clue-frame {
    position: absolute;
    inset: -7px -11px;
    background-repeat: no-repeat;
    background-size: 500% 500%;
  }
  .clue-frame {
    display: none;
    background-image: url("images/clues_on.png");
    background-position: 0% 100%;
    z-index: 2;
    pointer-events: none;
  }
  .clue-cell.selected .clue-frame { display: block; }
  #clueKeywords {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 8px;
    width: 90%;
    margin: 18px auto 0;
    padding: 0 10px;
    min-height: 36px;
    font-size: clamp(13px, 1.4vw, 18px);
    line-height: 1.4;
    text-align: center;
  }
  .clue-keyword-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    max-width: 100%;
    padding: 7px 12px;
    border-radius: 10px;
    background: rgba(0,0,0,.55);
    color: #fff;
    white-space: nowrap;
  }
  #cluePopup .popup-actions { margin-top: 32px; }
  #cluePopup .action-btn { min-height: 48px; padding: 10px 22px; }

  /* Settings popup: buttons only */
  #settingsPopup {
    width: min(88vw, 420px);
    max-height: none;
    overflow: visible;
    background: transparent;
    border-radius: 0;
    padding: 0;
  }
  #settingsPopup h2 { display: none; }
  #settingsPopup .choice-stack {
    width: 100%;
  }

  /* Choice popup: buttons only */
  #choicePopup {
    width: min(88vw, 520px);
    max-height: none;
    overflow: visible;
    background: transparent;
    border-radius: 0;
    padding: 0;
  }

  /* Reasoning */
  #reasoningPopup {
    width: min(96vw, 1040px);
    max-height: 92vh;
    overflow: visible;
    background: transparent;
    border-radius: 0;
  }
  #reasoningContentViewport {
    width: 100%;
    overflow: visible;
  }
  #reasoningContent {
    width: 100%;
    transform-origin: top center;
  }
  #reasoningText {
    font-size: clamp(17px, 1.7vw, 25px);

  function cancelBgmTransition() {
    if (bgmTransitionRaf !== null) {
      cancelAnimationFrame(bgmTransitionRaf);
      bgmTransitionRaf = null;

  function playBgm(name) {
    if (currentBgm === name && !audio.bgm.paused) return;
    cancelBgmTransition();
    currentBgm = name;
    audio.bgm.pause();
    audio.bgm.src = `bgm/${name}`;
    audio.bgm.currentTime = 0;
    audio.bgm.volume = BGM_VOLUME;
    audio.bgm.play().catch(()=>{});
  }

  function transitionBgm(name, duration = 700) {
    if (currentBgm === name && !audio.bgm.paused) return;
    cancelBgmTransition();

    const from = audio.bgm;
    const fromStartVolume = from.paused ? 0 : from.volume;
    const to = new Audio(`bgm/${name}`);
    to.loop = true;
    to.volume = 0;

    audio.bgm = to;
    outgoingBgm = from;
    currentBgm = name;
    to.play().catch(()=>{});

    const startedAt = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - startedAt) / duration);
      const eased = 0.5 - Math.cos(Math.PI * t) / 2;
      from.volume = fromStartVolume * (1 - eased);
      to.volume = BGM_VOLUME * eased;

      if (t < 1) {
        bgmTransitionRaf = requestAnimationFrame(tick);
        return;
      }

      from.pause();
      from.volume = BGM_VOLUME;
      outgoingBgm = null;
      bgmTransitionRaf = null;
      to.volume = BGM_VOLUME;
    };
    bgmTransitionRaf = requestAnimationFrame(tick);
  }

      const merged = Object.fromEntries(
        Object.keys(base).map(key => [key, Object.prototype.hasOwnProperty.call(parsed, key) ? parsed[key] : base[key]])

      merged.version = base.version;
      if (!Array.isArray(merged.clues) || merged.clues.length !== 20) merged.clues = Array(20).fill(false);
      if (!Array.isArray(merged.hintRevealedClues) || merged.hintRevealedClues.length !== 20) {
        merged.hintRevealedClues = Array(20).fill(false);
      }
      merged.hintUseCount = Math.max(0, Number(merged.hintUseCount) || 0);
      if (!Array.isArray(merged.keywords)) merged.keywords = ["피해자","범인"];
      if (!Array.isArray(merged.reasoningDraft) || merged.reasoningDraft.length !== finalAnswers.length) {
        merged.reasoningDraft = Array(finalAnswers.length).fill("");
      }
      merged.wrongRebuttalCount = Math.max(0, Number(merged.wrongRebuttalCount) || 0);
      merged.wrongReasoningCount = Math.max(0, Number(merged.wrongReasoningCount) || 0);
      merged.strangeHatUnlocked = Boolean(merged.strangeHatUnlocked);
      merged.strangeHatOn = merged.strangeHatUnlocked && Boolean(merged.strangeHatOn);
      localStorage.setItem(SAVE_KEY, JSON.stringify(merged));
      return merged;
    } catch(e) {
      return defaultState();
    }

  function fitToastToViewport(el) {
    el.style.fontSize = "";

    const availableWidth = Math.max(120, innerWidth - 20);
    const naturalWidth = el.scrollWidth;
    if (naturalWidth <= availableWidth) return;

    const computed = getComputedStyle(el);
    const baseFontSize = parseFloat(computed.fontSize) || 18;
    const basePaddingLeft = parseFloat(computed.paddingLeft) || 0;
    const basePaddingRight = parseFloat(computed.paddingRight) || 0;
    const scale = Math.max(0.55, availableWidth / naturalWidth);

    el.style.fontSize = `${Math.max(11, baseFontSize * scale)}px`;
    el.style.paddingLeft = `${Math.max(8, basePaddingLeft * scale)}px`;

    baseOffsetX = (vw - sw) / 2;
    baseOffsetY = (vh - sh) / 2;

  function clampPan() {
    const overflowX = Math.max(0, 1920 * sceneScale - innerWidth);
    const overflowY = Math.max(0, 1080 * sceneScale - innerHeight);
    const maxPanX = overflowX / 2;
    const maxPanY = overflowY / 2;


    panX = Math.min(maxPanX, Math.max(-maxPanX, panX));
    panY = Math.min(maxPanY, Math.max(-maxPanY, panY));

    const x = baseOffsetX + panX;
    const y = baseOffsetY + panY;
    $("sceneInner").style.transform = `translate3d(${x}px, ${y}px, 0) scale(${sceneScale})`;
    updatePanArrows(maxPanX, maxPanY);

  function easeOutSine(t) { return Math.sin((t * Math.PI) / 2); }
  function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }

  function tweenBird(duration, fromScale, toScale, fromX, toX, fromY, toY, easing, frameFn, done) {
    const start = performance.now();
    function tick(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = easing(t);
      const scale = fromScale + (toScale - fromScale) * eased;
      const x = fromX + (toX - fromX) * eased;
      const y = fromY + (toY - fromY) * eased;
      $("birdSprite").style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
      frameFn?.(now-start);
      if (t < 1 && birdVisible) requestAnimationFrame(tick);
      else done?.();
    }
    requestAnimationFrame(tick);
  }

  function runBirdSequence() {
    if (!state.windowOpen) return;
    birdVisible = true;
    const bird = $("birdSprite");
    bird.style.opacity = 1;
    bird.classList.toggle("active", !state.clues[13]);

    let flip = 0;
    tweenBird(750, 0, 1, -40, 0, -120, 0, easeOutSine, (elapsed) => {
      const frame = Math.floor(elapsed / 150) % 2;
      if (frame !== flip) flip = frame;
      setBirdFrame(frame);
    }, () => {
      const sequence = [
        [2,100],[3,100],[4,100],
        [5,500],
        [6,350],
        [7,1500],
        [8,100],[9,100],[10,100],[11,100],[12,100],[13,100]
      ];
      let pos = 0;
      const playNext = () => {
        if (!birdVisible) return;
        if (pos >= sequence.length) {
          const outStart = performance.now();
          tweenBird(1000, 1, 0, 0, 40, 0, -100, easeOutSine, (elapsed) => {
            setBirdFrame(14 + (Math.floor(elapsed / 100) % 2));
          }, () => {
            birdVisible = false;
            bird.classList.remove("active");
            bird.style.opacity = 0;
            scheduleBird();
          });
          return;
        }
        const [frame, dur] = sequence[pos++];
        setBirdFrame(frame);
        setTimeout(playNext, dur);
      };
      playNext();
    });
  }

  function openDialogue(entries, options={}) {
    dialogueLocked = true;
    dialogue = {
      entries: entries.flatMap(entry => {
        const lines = String(entry.text).split("\n");

    $("speakerName").className = isDoguri ? "doguri" : "mung";

    playSfx("next");
    dialogue.index++;

      showDialogueLine();

  function buildClueGrid() {

      return;
    }
    playSfx("flick");
    selectedClue = idx;

      openDialogue(clueData[idx].lines.map(text => ({speaker:"도구리", text, thought:true})), {mode:"first", onComplete:()=>{}});

  function updateClueSelection() {
    document.querySelectorAll(".clue-cell").forEach((el, i) => el.classList.toggle("selected", i === selectedClue));
    $("cluePresentButton").disabled = cluePopupMode === "present" && selectedClue === null;

  function closeCluePopup(resumeGameBgm = true) {

    $("dim").classList.add("hidden");

    if (resumeGameBgm) playBgm("bgm_game.mp3");

  function startRebuttal() {
    if (state.rebuttalStage >= 5) return startFinalLeadIn();
    setMode("conversation");
    const stage = rebuttals[state.rebuttalStage];
    openDialogue(stage.claim.map(text => ({speaker:"멍반장", text})), {
      mode:"third",
      onComplete:() => showChoice([
        {label:"지금 반박한다", action:beginObjection},
        {label:"조금 더 조사한다", cancel:true, action:returnToBase}
      ])
    });

  function beginObjection() {
    transitionBgm("bgm_finalclue.mp3", 700);
    openCluePopup("present");
  }

  function submitEvidence() {
    if (selectedClue === null) return;
    const submittedClue = selectedClue;
    const stage = rebuttals[state.rebuttalStage];
    const correct = stage.correct.includes(submittedClue);
    closeCluePopup(false);

    if (!correct) {
      state.wrongRebuttalCount++;
      saveState();
      stopBgm();
      playSfx("wrong");
      openDialogue([
        {speaker:"멍반장", text:"그건 아닌 것 같습니다."},
        {speaker:"멍반장", text:"왜 아닌지는… 조금만 더 생각해보겠습니다."}
      ], {mode:"third", onComplete:returnToBase});
      return;
    }

    clearTimeout(objectionBgmTimer);
      objectionBgmTimer = null;
      playBgm("bgm_objection.mp3");
    const response = stage.response(submittedClue);
    openDialogue(response, {mode:"third", onComplete:() => {
      state.rebuttalStage++;
      state.chatUpdated = true;
      saveState();
      updateMenuBadges();
      returnToBase(true);
    }});
  }

  function returnToBase(useBgmTransition = false) {
    clearTimeout(objectionBgmTimer);
    objectionBgmTimer = null;
    closeAllPopups();
    setMode("base");
    if (useBgmTransition) transitionBgm("bgm_game.mp3", 700);
    else playBgm("bgm_game.mp3");
    updateHotspots();

  function startFinalLeadIn() {
    setMode("conversation");
    openDialogue([
      {speaker:"멍반장", text:"이쯤 되면 저도 압니다."},
      {speaker:"멍반장", text:"제가 뭔가 모른다는 걸요."}
    ], {mode:"third", onComplete:() => showChoice([
      {label:"추리를 완성한다", action:startReasoning},
      {label:"조금 더 조사한다", cancel:true, action:returnToBase}
    ])});
  }

  function startReasoning() {
    openReasoningPopup();
  }

  function openReasoningPopup() {
    transitionBgm("bgm_finalclue.mp3", 700);
    reasoningSlots = Array.isArray(state.reasoningDraft) && state.reasoningDraft.length === finalAnswers.length
      ? state.reasoningDraft.slice()
      : Array(finalAnswers.length).fill("");
    selectedKeyword = null;
    renderReasoning();
    $("dim").classList.remove("hidden");
    $("reasoningPopup").classList.remove("hidden");
    requestAnimationFrame(fitReasoningContentToViewport);
  }

  function fitReasoningContentToViewport() {
    const popup = $("reasoningPopup");
    if (!popup || popup.classList.contains("hidden")) return;

    const viewport = $("reasoningContentViewport");
    const content = $("reasoningContent");
    const actions = popup.querySelector(".popup-actions");
    if (!viewport || !content || !actions) return;

    content.style.transform = "scale(1)";
    viewport.style.height = "auto";

    const contentHeight = content.scrollHeight;
    const popupStyle = getComputedStyle(popup);
    const actionsStyle = getComputedStyle(actions);
    const paddingTop = parseFloat(popupStyle.paddingTop) || 0;
    const paddingBottom = parseFloat(popupStyle.paddingBottom) || 0;
    const actionsMarginTop = parseFloat(actionsStyle.marginTop) || 0;
    const actionsHeight = actions.offsetHeight + actionsMarginTop;
    const viewportRatio = innerWidth <= 700 ? 0.96 : 0.92;
    const maxPopupHeight = innerHeight * viewportRatio;
    const availableContentHeight = Math.max(
      120,
      maxPopupHeight - paddingTop - paddingBottom - actionsHeight
    );
    const scale = Math.min(1, availableContentHeight / Math.max(1, contentHeight));

    content.style.transform = `scale(${scale})`;
    viewport.style.height = `${Math.ceil(contentHeight * scale)}px`;
  }

  function createKeywordDragPreview(chip) {
    const preview = document.createElement("div");
    preview.className = "keyword-drag-preview";
    const previewChip = chip.cloneNode(true);
    previewChip.classList.add("selected");
    preview.appendChild(previewChip);
    document.body.appendChild(preview);
    return preview;
  }

  function startKeywordPointerDrag(e, chip, word) {
    // PC 마우스는 기존 HTML5 drag/drop을 사용하고,
    // 모바일 터치와 펜 입력만 Pointer Events로 직접 처리한다.
    if (e.pointerType === "mouse") return;

    keywordPointerDrag = {
      pointerId: e.pointerId,
      chip,
      word,
      startX: e.clientX,
      startY: e.clientY,
      moved: false,
      preview: null
    };
    chip.setPointerCapture?.(e.pointerId);
  }

  function moveKeywordPointerDrag(e) {
    const dragInfo = keywordPointerDrag;
    if (!dragInfo || e.pointerId !== dragInfo.pointerId) return;

    const dx = e.clientX - dragInfo.startX;
    const dy = e.clientY - dragInfo.startY;
    if (!dragInfo.moved && Math.hypot(dx, dy) <= 8) return;

    if (!dragInfo.moved) {
      dragInfo.moved = true;
      suppressKeywordClick = true;
      selectedKeyword = dragInfo.word;
      updateKeywordSelection();
      dragInfo.preview = createKeywordDragPreview(dragInfo.chip);
    }

    e.preventDefault();
    dragInfo.preview.style.left = `${e.clientX}px`;
    dragInfo.preview.style.top = `${e.clientY}px`;
  }

  function finishKeywordPointerDrag(e, cancelled = false) {
    const dragInfo = keywordPointerDrag;
    if (!dragInfo || e.pointerId !== dragInfo.pointerId) return;

    keywordPointerDrag = null;
    dragInfo.preview?.remove();

    if (dragInfo.moved) {
      e.preventDefault();
      if (!cancelled) {
        const target = document.elementFromPoint(e.clientX, e.clientY)?.closest?.(".blank-slot");
        if (target && $("reasoningPopup").contains(target)) {
          const slotIndex = Number(target.dataset.slot);
          if (Number.isInteger(slotIndex)) {
            reasoningSlots[slotIndex] = dragInfo.word;
            selectedKeyword = null;
            playSfx("flick");
            renderReasoning();
          }
        }
      }

      setTimeout(() => {
        suppressKeywordClick = false;
        if (selectedKeyword === dragInfo.word) {
          selectedKeyword = null;
          updateKeywordSelection();
        }
      }, 0);
    }
  }

  function renderReasoning() {
    const container = $("reasoningText");
    container.innerHTML = "";

    const lines = [
      [0, "는 ", 1, " 때문에 넘어진 것이 아니다."],
      ["머리의 ", 2, "과 ", 3, "은 ", 4, "처럼 보이게 하려는 ", 5, "이다."],
      ["진짜 ", 6, "은 몸에 난 깊고 좁은 ", 7, "."],
      [8, "은 흉기를 남기지 않기 위해 ", 9, " 위에 올라가, 창밖 처마의 ", 10, "을 꺾어 ", 11, "를 찔렀다."],
      ["그리고 ", 12, "을 잠근 뒤, ", 13, "를 숨겼다."],
      ["창밖의 눈에 발자국을 남기지 않기 위해, 잠금 장치를 누른 뒤 ", 14, "으로 나갔다."]
    ];

    lines.forEach(parts => {
      const div = document.createElement("div");
      parts.forEach(part => {
        if (typeof part === "number") div.appendChild(makeSlot(part));
        else div.appendChild(document.createTextNode(part));
      });
      container.appendChild(div);
    });

    const bank = $("keywordBank");
    bank.innerHTML = "";

    const usedKeywordCount = reasoningSlots.reduce((counts, word) => {
      if (word) counts[word] = (counts[word] || 0) + 1;
      return counts;
    }, {});
    const requiredKeywordCount = finalAcceptedAnswers.reduce((counts, options) => {
      options.forEach(word => {
        counts[word] = (counts[word] || 0) + 1;
      });
      return counts;
    }, {});

    getSortedKeywords(state.keywords).forEach(word => {
      const availableCount = Math.max(1, requiredKeywordCount[word] || 0) - (usedKeywordCount[word] || 0);
      if (availableCount <= 0) return;

      const chip = document.createElement("button");
      chip.className = "keyword-chip";
      chip.textContent = word;
      chip.draggable = true;
      chip.addEventListener("pointerdown", (e) => startKeywordPointerDrag(e, chip, word));
      chip.addEventListener("dragstart", (e) => {
        e.dataTransfer.setData("text/plain", word);
        selectedKeyword = word;
        updateKeywordSelection();

        const preview = document.createElement("div");
        preview.className = "keyword-drag-preview";
        const previewChip = chip.cloneNode(true);
        previewChip.classList.add("selected");
        preview.appendChild(previewChip);
        document.body.appendChild(preview);

        e.dataTransfer.setDragImage(
          preview,
          preview.offsetWidth / 2,
          preview.offsetHeight / 2
        );
        setTimeout(() => preview.remove(), 0);
      });
      chip.addEventListener("click", () => {
        if (suppressKeywordClick) return;
        playSfx("flick");
        selectedKeyword = selectedKeyword === word ? null : word;
        updateKeywordSelection();
      });
      bank.appendChild(chip);
    });
    updateKeywordSelection();
    updateReasoningConfirmState();
    if (!$("reasoningPopup").classList.contains("hidden")) {
      requestAnimationFrame(fitReasoningContentToViewport);
    }
  }

  function updateReasoningConfirmState() {
    $("reasoningConfirm").disabled = !reasoningSlots.every(Boolean);
  }

  function makeSlot(idx) {
    const slot = document.createElement("button");
    slot.className = "blank-slot";
    slot.dataset.slot = idx;
    slot.textContent = reasoningSlots[idx] || "";
    slot.addEventListener("click", () => {
      if (selectedKeyword) {
        reasoningSlots[idx] = selectedKeyword;
        playSfx("flick");
        selectedKeyword = null;
        renderReasoning();
      } else if (reasoningSlots[idx]) {
        reasoningSlots[idx] = "";
        renderReasoning();
      }
    });
    slot.addEventListener("dragover", e => {
      e.preventDefault();
    });
    slot.addEventListener("drop", e => {
      e.preventDefault();
      reasoningSlots[idx] = e.dataTransfer.getData("text/plain");
      selectedKeyword = null;
      playSfx("flick");
      renderReasoning();
    });
    return slot;
  }

  function updateKeywordSelection() {
    document.querySelectorAll(".keyword-chip").forEach(el => el.classList.toggle("selected", el.textContent === selectedKeyword));
  }

  function cancelReasoning(useBgmTransition = true) {
    state.reasoningDraft = reasoningSlots.slice();
    saveState();
    $("reasoningPopup").classList.add("hidden");
    $("dim").classList.add("hidden");
    returnToBase(useBgmTransition);
  }

  function submitReasoning() {
    if (!reasoningSlots.every(Boolean)) return;
    const correct = finalAcceptedAnswers.every((options, i) => options.includes(reasoningSlots[i]));
    $("reasoningPopup").classList.add("hidden");
    $("dim").classList.add("hidden");

    if (!correct) {
      state.wrongReasoningCount++;
      state.reasoningDraft = reasoningSlots.slice();
      saveState();
      transitionBgm("bgm_game.mp3", 700);
      playSfx("wrong");
      openDialogue([
        {speaker:"멍반장", text:"뭔가 놓친 것 같습니다."},
        {speaker:"멍반장", text:"하지만 뭘 놓쳤는지는 놓쳤습니다."}
      ], {mode:"third", onComplete:returnToBase});
      return;
    }

    state.reasoningDraft = Array(finalAnswers.length).fill("");
    playSfx("correct");
    completeGame();
  }

  function completeGame() {
    stopTimer();
    state.finalTimeMs = state.elapsedMs;
    state.runActive = false;
    state.completed = true;
    saveState();
    transitionBgm("bgm_peace.mp3", 700);

    setTimeout(() => {
      openDialogue([
        {speaker:"도구리", text:"이건 단순한 사고가 아니에요."},
        {speaker:"도구리", text:"피해자는 누군가에게 살해당한 거예요."},
        {speaker:"멍반장", text:"사고사가 아니라… 제가 사고를 칠 뻔했네요."}
      ], {mode:"third", onComplete:showClearPopup});
    }, 450);
  }

  function formatClearTime(ms) {
    const totalMinutes = Math.max(0, Math.floor(ms / 60000));
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    return hours > 0 ? `${hours}시간 ${minutes}분` : `${totalMinutes}분`;
  }

  function calculateDeductionScore() {
    const missingClues = 20 - state.clues.filter(Boolean).length;
    const score = 100
      - missingClues * 3
      - state.wrongRebuttalCount * 7
      - state.wrongReasoningCount * 9
      - state.hintUseCount;
    return Math.max(0, score);
  }

  function stopClearResultAnimations() {
    clearRevealTimers.forEach(clearTimeout);
    clearRevealTimers = [];
    if (clearScoreRaf !== null) {
      cancelAnimationFrame(clearScoreRaf);
      clearScoreRaf = null;
    }
    clearTimeout(clearConfettiTimer);
    clearConfettiTimer = null;
    const confettiLayer = $("clearConfettiLayer");
    if (confettiLayer) confettiLayer.innerHTML = "";
  }

  function playClearConfetti() {
    const layer = $("clearConfettiLayer");
    if (!layer) return;

    clearTimeout(clearConfettiTimer);
    layer.innerHTML = "";

    const colors = [
      "#02a3f4", "#7dbb02", "#ffbc03", "#f95414"
    ];

    const pieceCount = 30;

    for (let i = 0; i < pieceCount; i++) {
      const piece = document.createElement("span");
      piece.className = "clear-confetti";

      const width = 7 + Math.random() * 17;
      const height = 10 + Math.random() * 30;
      const drift = -180 + Math.random() * 360;
      const spin = 360 + Math.random() * 1080;
      const duration = 12000 + Math.random() * 5000;
      const delay = Math.random() * 4500;
      const startY = -35 + Math.random() * 15;
      const endY = 125 + Math.random() * 20;
      const laneX = ((i + 0.5) / pieceCount) * 100;
      const jitterX = -1.2 + Math.random() * 2.4;

      piece.style.setProperty("--x", `${Math.max(0, Math.min(100, laneX + jitterX)).toFixed(2)}%`);
      piece.style.setProperty("--w", `${width.toFixed(1)}px`);
      piece.style.setProperty("--h", `${height.toFixed(1)}px`);
      piece.style.setProperty("--color", colors[Math.floor(Math.random() * colors.length)]);
      piece.style.setProperty("--drift", `${drift.toFixed(0)}px`);
      piece.style.setProperty("--spin", `${spin.toFixed(0)}deg`);
      piece.style.setProperty("--duration", `${duration.toFixed(0)}ms`);
      piece.style.setProperty("--delay", `${delay.toFixed(0)}ms`);
      piece.style.setProperty("--start-y", `${startY.toFixed(1)}vh`);
      piece.style.setProperty("--end-y", `${endY.toFixed(1)}vh`);
      layer.appendChild(piece);
    }

    clearConfettiTimer = setTimeout(() => {
      layer.innerHTML = "";
      clearConfettiTimer = null;
    }, 22500);
  }

  function animateDeductionScore(target, duration = 3000) {
    const el = $("clearScoreValue");
    const startedAt = performance.now();
    el.textContent = "0";

    const tick = (now) => {
      const t = Math.min(1, (now - startedAt) / duration);
      const eased = 1 - Math.pow(1 - t, 4);
      el.textContent = String(Math.round(target * eased));
      if (t < 1) {
        clearScoreRaf = requestAnimationFrame(tick);
      } else {
        clearScoreRaf = null;
        el.textContent = String(target);
      }
    };
    clearScoreRaf = requestAnimationFrame(tick);
  }

  function scheduleClearReveal(id, delay, callback) {
    const timer = setTimeout(() => {

  function getClearComment(score) {
    if (score >= 95) return "완벽하군요. 역시 제 조수답습니다.";
    if (score >= 85) return "훌륭합니다. 거의 제가 추리한 것 같군요.";
    if (score >= 75) return "좋은 추리였습니다. 몇 군데는 눈감아 드리죠.";
    if (score >= 65) return "제법입니다. 저와 비슷한 수준이군요.";
    if (score >= 50) return "조금 아쉽군요. 그래도 사건은 해결됐습니다.";
    return "…사건은 해결됐으니, 자세한 건 묻지 맙시다.";
  }

  function updateClearInfoScale() {
    const scaleWrap = $("clearInfoScale");
    const group = $("clearInfoGroup");
    const title = $("clearTitle");
    const actions = $("clearActions");
    const popup = $("clearPopup");
    if (!scaleWrap || !group || !title || !actions || !popup || isVisible("clearPopup") === false) return;

    // reveal 애니메이션의 translateY와 현재 scale을 무시하고,
    // 최종 레이아웃 기준 크기로 계산한다.
    const naturalHeight = Math.max(1, scaleWrap.offsetHeight);
    const groupRect = group.getBoundingClientRect();
    const popupRect = popup.getBoundingClientRect();
    const centerY = groupRect.top + groupRect.height / 2;
    const titleBottom = popupRect.top + title.offsetTop + title.offsetHeight;
    const actionsTop = popupRect.top + actions.offsetTop;
    const safety = 40;
    const topRoom = centerY - titleBottom - safety;
    const bottomRoom = actionsTop - centerY - safety;
    const availableHeight = Math.max(1, Math.min(topRoom, bottomRoom) * 2);
    const scale = Math.max(.52, Math.min(1, availableHeight / naturalHeight));

    scaleWrap.style.setProperty("--clear-info-scale", scale.toFixed(3));
  }

  function hintText() {
    if (state.rebuttalStage >= 5) {
      const complete = finalAcceptedAnswers.every(options => options.some(word => state.keywords.includes(word)));
      return complete ? "단서는 이제 충분합니다." : "아직 단서가 부족합니다.";
    }
    const correct = rebuttals[state.rebuttalStage].correct;
    const acquired = correct.find(idx => state.clues[idx]);
    return acquired === undefined ? "현장을 조사하세요." : "필요한 단서가 이미 있습니다.";
  }

  function revealOneHiddenClueName() {
    const hiddenMissing = clueData
      .map((_, idx) => idx)
      .filter(idx => !state.clues[idx] && !state.hintRevealedClues[idx]);

    if (hiddenMissing.length === 0) return null;

    let candidates = [];
    if (state.rebuttalStage < rebuttals.length) {
      candidates = rebuttals[state.rebuttalStage].correct
        .filter(idx => hiddenMissing.includes(idx));
    }

    if (candidates.length === 0 && state.rebuttalStage >= rebuttals.length) {
      const missingFinalWords = new Set(
        finalAcceptedAnswers
          .filter(options => !options.some(word => state.keywords.includes(word)))
          .flat()
      );
      candidates = hiddenMissing.filter(idx =>
        clueData[idx].keywords.some(keyword => missingFinalWords.has(keyword))
      );
    }

    const pool = candidates.length > 0 ? candidates : hiddenMissing;
    const idx = pool[Math.floor(Math.random() * pool.length)];
    state.hintRevealedClues[idx] = true;
    return idx;
  }

  function useHint() {

      $("dim").classList.toggle("hidden", !hasPopupUnder);
      return;

    if (isVisible("settingsPopup")) {
      playSfx("cancel");
      $("settingsPopup").classList.add("hidden");
      $("dim").classList.add("hidden");
      return;

    if (isVisible("cluePopup")) {

      playSfx("cancel");
      closeCluePopup();
      returnToBase();
      return;
    }

    if (isVisible("reasoningPopup")) {

    e.target.setPointerCapture?.(e.pointerId);
  });
  $("sceneViewport").addEventListener("pointermove", (e) => {
    if (!drag.active || currentMode !== "investigate") return;
    const dx = e.clientX - drag.startX;
    const dy = e.clientY - drag.startY;
    if (Math.hypot(dx, dy) > 8 && !drag.moved) {
      drag.moved = true;
      $("sceneViewport").classList.add("cursor-drag");
    }
    if (drag.moved) {
      panX = drag.startPanX + dx;
      panY = drag.startPanY + dy;
      clampPan();
    }
  });
  function finishSceneDrag(e) {
    if (!drag.active) return;
    const wasMoved = drag.moved;
    drag.active = false;
    $("sceneViewport").classList.remove("cursor-drag");
    $("sceneViewport").classList.toggle("cursor-investigate", currentMode === "investigate");
    setTimeout(() => { drag.moved = false; }, 0);
    if (!wasMoved && !drag.startedOnClue && e.type === "pointerup" && e.target === $("sceneViewport")) {
      openDialogue([{speaker:"도구리", text:"여긴… 아무것도 없는 것 같아.", thought:true}], {mode:"first", onComplete:()=>setMode("investigate")});
    }
  }
  $("sceneViewport").addEventListener("pointerup", finishSceneDrag);
  $("sceneViewport").addEventListener("pointercancel", finishSceneDrag);
  $("sceneInner").addEventListener("click", (e) => {
    if (dialogueLocked || drag.moved) return;
    const isEmptyScene = e.target === $("sceneBg") || e.target === $("sceneInner") || e.target === $("hotspotLayer");
    if (!isEmptyScene) return;

    if (currentMode === "investigate") {
      openDialogue([{speaker:"도구리", text:"여긴… 아무것도 없는 것 같아.", thought:true}], {mode:"first", onComplete:()=>setMode("investigate")});
    }
  });

  window.addEventListener("resize", resizeScene);
  window.addEventListener("resize", updateClearInfoScale);
  window.addEventListener("resize", fitReasoningContentToViewport);
  window.addEventListener("resize", syncStartSubtitleToTitleImage);

  const startTitleResizeObserver = new ResizeObserver(syncStartSubtitleToTitleImage);
  startTitleResizeObserver.observe($("startTitle"));
  $("startTitle").addEventListener("load", syncStartSubtitleToTitleImage);
  window.addEventListener("beforeunload", saveState);
  document.addEventListener("visibilitychange", () => { if (document.hidden) saveState(); });
  setInterval(() => { if (state.runActive) saveState(); }, 10000);

  // Prevent browser zoom gestures, long-press selection, and image dragging on mobile.
  const preventBrowserGesture = (e) => e.preventDefault();
  ["gesturestart", "gesturechange", "gestureend"].forEach(type => {
    document.addEventListener(type, preventBrowserGesture, {passive:false});
  });
  document.addEventListener("touchstart", e => {
    if (e.touches.length > 1) e.preventDefault();
  }, {passive:false});
  document.addEventListener("touchmove", e => {
    if (e.touches.length > 1) e.preventDefault();
  }, {passive:false});
  document.addEventListener("selectstart", e => e.preventDefault());
  document.addEventListener("contextmenu", e => e.preventDefault());
  document.addEventListener("dragstart", e => {
    if (e.target instanceof HTMLImageElement) e.preventDefault();
  });
  document.addEventListener("dblclick", e => e.preventDefault(), {passive:false});
  document.addEventListener("wheel", e => {
    if (e.ctrlKey) e.preventDefault();
  }, {passive:false});

  // Initialize
  buildHotspots();
  syncStartSubtitleToTitleImage();
  resizeScene();
  applyStrangeHat();
  updateMenuBadges();
  updateHotspots();
  updateTestModeControls();
  showInitialScreen();
})();
</script>
</body>
</html>
