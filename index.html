<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0d" />
<title>명탐정 도구리</title>
<meta name="description" content="명탐정 도구리 - 겨울 산장 살인 사건" />

<!-- 링크 공유 미리보기 -->
<meta property="og:type" content="website" />
<meta property="og:title" content="명탐정 도구리" />
<meta property="og:description" content="겨울 산장 살인 사건" />
<meta property="og:image" content="images/thumb_0.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:type" content="image/png" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="명탐정 도구리" />
<meta name="twitter:description" content="겨울 산장 살인 사건" />
<meta name="twitter:image" content="images/thumb_0.png" />

<!-- 진엔딩 장면 전환 시 온라인 환경에서도 이미지가 늦게 뜨지 않도록 미리 요청합니다. -->
<link rel="preload" as="image" href="images/bg_e_01.png" />
<link rel="preload" as="image" href="images/bg_e_02.png" />
<style>
  :root {
    --doguri: #f79f92;
    --mung: #e2a559;
    --panel: rgba(0, 0, 0, 0.72);
    --line: rgba(255, 255, 255, 0.35);
    --ui: rgba(255, 255, 255, 0.96);
    --uiText: #151515;
    --radius: 24px;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #000;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    font-family: Arial, "Noto Sans KR", sans-serif;
    color: #fff;
    touch-action: none;
    cursor: url("images/cursor_default.png") 64 64, auto;
  }
  img {
    -webkit-user-drag: none;
    user-drag: none;
    -webkit-touch-callout: none;
  }
  #app, #app * {
    cursor: url("images/cursor_default.png") 64 64, auto;
    /* iPad Safari에서도 터치 대상 요소 자체가 확대 제스처를 시작하지 못하게 한다. */
    touch-action: none;
  }
  #sceneViewport.cursor-investigate,
  #sceneViewport.cursor-investigate * {
    cursor: url("images/cursor_investigate.png") 64 64, auto;
  }
  #sceneViewport.cursor-drag,
  #sceneViewport.cursor-drag * {
    cursor: url("images/cursor_drag.png") 64 64, auto;
  }
  button, input { font: inherit; }
  button {
    border: 0;
    outline: 0;
  }
  button, .pressable {
    transform: scale(1);
    transition: transform 120ms ease;
  }
  @media (hover: hover) and (pointer: fine) {
    button:hover, .pressable:hover { transform: scale(1.055); }
  }
  button:active, .pressable:active { transform: scale(0.94); }

  #app {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: #000;
  }

  .hidden { display: none !important; }
  .serif {
    font-family: "AppleMyungjo", "Noto Serif KR", "Nanum Myeongjo", "Batang", "Times New Roman", serif;
  }

  /* Shared scene */
  #sceneViewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: #000;
    z-index: 1;
  }
  .scene-pan-arrow {
    position: absolute;
    z-index: 18;
    width: clamp(52px, 6vw, 96px);
    height: clamp(52px, 6vw, 96px);
    object-fit: contain;
    pointer-events: none;
    opacity: .92;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,.55));
  }
  #panArrowW { left: max(10px, env(safe-area-inset-left)); top: 50%; transform: translateY(-50%); }
  #panArrowE { right: max(10px, env(safe-area-inset-right)); top: 50%; transform: translateY(-50%); }
  #panArrowN { top: max(10px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); }
  #panArrowS { bottom: max(10px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); }
  #sceneInner {
    position: absolute;
    left: 0;
    top: 0;
    width: 1920px;
    height: 1080px;
    transform-origin: 0 0;
    will-change: transform;
  }
  #sceneBg, #windowClosed {
    position: absolute;
    display: block;
    pointer-events: none;
  }
  #sceneBg {
    inset: 0;
    width: 1920px;
    height: 1080px;
    object-fit: cover;
    object-position: center top;
  }
  #windowClosed {
    left: 848px;
    top: 10px;
    width: 512px;
    height: 512px;
    object-fit: contain;
    z-index: 3;
  }
  #hotspotLayer {
    position: absolute;
    inset: 0;
    z-index: 6;
  }
  .hotspot {
    position: absolute;
    background: transparent;
    border: 0;
    padding: 0;
  }
  .hotspot.debug { outline: 2px solid rgba(255, 0, 0, .5); background: rgba(255, 0, 0, .08); }

  #birdSprite {
    position: absolute;
    left: 1138px;
    top: 306px;
    width: 100px;
    height: 100px;
    background-image: url("images/bird.png");
    background-repeat: no-repeat;
    background-size: 400% 400%;
    z-index: 8;
    opacity: 0;
    transform: translate(-40px, -40px) scale(0);
    transform-origin: 50% 90%;
    pointer-events: none;
  }
  #birdSprite.active { pointer-events: auto; }

  .found-circle {
    position: absolute;
    width: 128px;
    height: 128px;
    margin-left: -64px;
    margin-top: -64px;
    background: url("images/foundcircle.png") center/contain no-repeat;
    z-index: 15;
    pointer-events: none;
    animation: foundPulse 3s both;
  }
  @keyframes foundPulse {
    0% { opacity: 0; transform: scale(.55); }
    10% { opacity: 1; transform: scale(1.12); }
    18% { transform: scale(1); }
    82% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(.7); }
  }

  /* Initial */
  #initialScreen {
    position: absolute;
    inset: 0;
    z-index: 110;
    background: #000;
  }
  #versionLabel {
    position: absolute;
    right: max(16px, calc(env(safe-area-inset-right) + 8px));
    bottom: max(14px, calc(env(safe-area-inset-bottom) + 8px));
    z-index: 2;
    color: #fff;
    font-size: clamp(14px, 1.3vw, 20px);
    font-weight: 700;
    letter-spacing: .04em;
    pointer-events: none;
  }
  #testResetButton {
    position: absolute;
    left: max(16px, calc(env(safe-area-inset-left) + 8px));
    bottom: calc(max(14px, calc(env(safe-area-inset-bottom) + 8px)) + 42px);
    z-index: 3;
    min-height: 34px;
    padding: 6px 10px;
    border: 1px solid rgba(0,0,0,.12);
    border-radius: 9px;
    background: #fff;
    color: #111;
    font-size: clamp(11px, .95vw, 14px);
    font-weight: 800;
  }
  #testModeControls {
    position: absolute;
    left: max(16px, calc(env(safe-area-inset-left) + 8px));
    bottom: max(14px, calc(env(safe-area-inset-bottom) + 8px));
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #testModeToggle,
  #testScoreSelect {
    min-height: 34px;
    padding: 6px 10px;
    border: 1px solid rgba(0,0,0,.12);
    border-radius: 9px;
    background: #fff;
    color: #111;
    font-size: clamp(11px, .95vw, 14px);
    font-weight: 800;
  }
  #testModeToggle {
    min-width: 108px;
  }
  #testScoreSelect {
    outline: 0;
    cursor: pointer;
    color-scheme: light;
  }
  #testScoreSelect option {
    background: #fff;
    color: #111;
  }
  #testScoreSelect:disabled {
    opacity: .38;
    cursor: default;
  }
  #newGameConfirmDim {
    position: absolute;
    inset: 0;
    z-index: 120;
    background: #000;
  }
  #newGameConfirmPopup {
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 121;
    transform: translate(-50%, -50%);
    width: min(94vw, 680px);
    padding: 26px;
    border-radius: 22px;
    background: rgba(0,0,0,.78);
    text-align: center;
  }
  #newGameConfirmPopup p {
    margin: 0;
    font-size: clamp(14px, 2vw, 28px);
    line-height: 1.55;
    white-space: nowrap;
  }
  #newGameConfirmPopup .popup-actions { margin-top: 22px; }

  /* Start */
  #startScreen {
    position: absolute;
    inset: 0;
    z-index: 100;
    overflow: hidden;
    background: #000;
  }
  #startBg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
  }
  #startSnow,
  #endingSnow {
    position: absolute;
    inset: 0;
    z-index: 1;
    overflow: visible;
    pointer-events: none;
  }

  /* True ending */
  #trueEndingScreen {
    position: absolute;
    inset: 0;
    z-index: 55;
    overflow: hidden;
    background: #000;
  }
  #trueEndingBg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    pointer-events: none;
  }
  #endingSnow {
    z-index: 1;
  }
  .title-snowflake {
    position: absolute;
    left: var(--x);
    top: var(--start-y);
    width: var(--flake-w);
    height: var(--flake-h);
    border-radius: 50%;
    background: rgba(255,255,255,var(--alpha));
    filter: blur(var(--blur));
    box-shadow:
      0 0 calc(var(--flake-w) * .45) rgba(255,255,255,.46),
      inset 0 0 calc(var(--flake-h) * .18) rgba(255,255,255,.28);
    transform: translate3d(0, 0, 0) rotate(var(--rot-0));
    animation: titleSnowGust var(--duration) linear var(--delay) infinite;
    will-change: transform;
  }
  @keyframes titleSnowGust {
    0% {
      transform: translate3d(0, 0, 0) rotate(var(--rot-0));
    }
    16% {
      transform: translate3d(var(--path-x1), var(--path-y1), 0) rotate(var(--rot-1));
    }
    33% {
      transform: translate3d(var(--path-x2), var(--path-y2), 0) rotate(var(--rot-2));
    }
    50% {
      transform: translate3d(var(--path-x3), var(--path-y3), 0) rotate(var(--rot-3));
    }
    67% {
      transform: translate3d(var(--path-x4), var(--path-y4), 0) rotate(var(--rot-4));
    }
    84% {
      transform: translate3d(var(--path-x5), var(--path-y5), 0) rotate(var(--rot-5));
    }
    100% {
      transform: translate3d(var(--drift-x), var(--fall-y), 0) rotate(var(--rot-6));
    }
  }
  #startTitleGroup {
    /*
      부제는 title.png의 실제 표시 너비에만 연동됩니다.
      아래 두 비율만 바꾸면 PC/모바일 공통으로 조정됩니다.
      0.048  = 타이틀 이미지 너비의 4.8% 크기
      -0.036 = 타이틀 이미지 너비의 -3.6%만큼 위로 이동
    */
    --subtitle-size-ratio: 0.07;
    --subtitle-y-ratio: -0.01;
    --subtitle-stroke-ratio: 0.0066;
    position: absolute;
    width: min(56vw, 760px);
    left: 50%;
    top: 3vh;
    transform: translateX(-50%);
    z-index: 5;
    text-align: center;
    pointer-events: none;
  }
  #startTitle {
    position: relative;
    z-index: 2;
    display: block;
    width: 100%;
    max-height: 34vh;
    object-fit: contain;
  }
  #startSubtitle {
    position: relative;
    z-index: 4;
    margin-top: calc(var(--title-image-width) * var(--subtitle-y-ratio));
    color: #f30603;
    font-family: "AppleMyungjo", "Noto Serif KR", "Nanum Myeongjo", "Batang", Georgia, "Times New Roman", serif;
    font-size: calc(var(--title-image-width) * var(--subtitle-size-ratio));
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: .08em;
    white-space: nowrap;
    -webkit-text-stroke-width: calc(var(--title-image-width) * var(--subtitle-stroke-ratio));
    -webkit-text-stroke-color: #fff;
    paint-order: stroke fill;
    text-shadow: none;
  }
  #startDoguri {
    position: absolute;
    width: 84vh;
    height: 84vh;
    object-fit: contain;
    left: 50%;
    top: 73%;
    transform: translate(-50%, -50%);
    z-index: 2;
  }
  #startPrompt {
    position: absolute;
    left: 50%;
    bottom: max(8vh, calc(env(safe-area-inset-bottom) + 16px));
    transform: translateX(-50%);
    z-index: 3;
    isolation: isolate;
    font-size: clamp(20px, 2.5vw, 44px);
    font-weight: 400;
    letter-spacing: .04em;
    text-shadow: 0 2px 12px rgba(0,0,0,.8);
    animation: blink 2.4s cubic-bezier(.445, .05, .55, .95) infinite;
    white-space: nowrap;
  }
  #startPrompt::before {
    content: "";
    position: absolute;
    inset: -14px -28px;
    z-index: -1;
    border-radius: 50%;
    background: rgba(0,0,0,.10);
    filter: blur(14px);
    pointer-events: none;
  }
  @keyframes blink { 0%,100% { opacity: .25; } 50% { opacity: 1; } }

  #startActions {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    width: min(78vw, 360px);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .start-action-btn {
    width: 100%;
    min-height: 58px;
    padding: 13px 24px;
    border-radius: 18px;
    background: #fff;
    color: #000;
    font-size: clamp(18px, 2vw, 27px);
    font-weight: 800;
  }

  /* Intro */
  #introScreen {
    position: absolute;
    inset: 0;
    z-index: 95;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8vw;
    text-align: center;
  }
  #introText {
    max-width: 1100px;
    font-size: clamp(24px, 3.2vw, 54px);
    line-height: 1.65;
    opacity: 0;
    transition: opacity .6s ease;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
  }
  #introText.show { opacity: 1; }
  /* 문장 교체 순간 기존 Safari 텍스트 합성 레이어를 완전히 제거한다. */
  #introText.switching {
    display: none;
    opacity: 0 !important;
    transition: none !important;
  }

  /* Main UI */
  #mainUi {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  #bottomBar {
    position: absolute;
    left: 50%;
    bottom: max(18px, calc(env(safe-area-inset-bottom) + 45px));
    transform: translateX(-50%);
    display: flex;
    gap: clamp(14px, 2.3vw, 34px);
    pointer-events: auto;
  }
  .icon-wrap { position: relative; }
  .update-badge {
    position: absolute;
    top: -17%;
    right: -9.5%;
    z-index: 4;
    width: 60%;
    height: 60%;
    object-fit: contain;
    pointer-events: none;
  }
  .icon-btn {
    position: relative;
    width: clamp(68px, 7vw, 106px);
    height: clamp(68px, 7vw, 106px);
    border-radius: 0;
    background: transparent;
    padding: 0;
    overflow: visible;
  }
  .icon-btn > img:not(.update-badge) { width: 100%; height: 100%; object-fit: contain; }
  .tooltip {
    position: absolute;
    left: 50%;
    bottom: calc(100% + 24px);
    transform: translateX(-50%) translateY(6px);
    padding: 12px 19px;
    border-radius: 18px;
    background: #000;
    color: #fff;
    font-size: clamp(17px, 1.55vw, 23px);
    line-height: 1.2;
    font-weight: 700;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: .15s ease;
  }
  .tooltip::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 100%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 12px solid #000;
  }
  @media (hover: hover) and (pointer: fine) {
    .icon-wrap:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  #settingsButton,
  #popupCloseButton {
    position: absolute;
    right: max(16px, env(safe-area-inset-right));
    top: max(16px, env(safe-area-inset-top));
    pointer-events: auto;
  }
  #popupCloseButton {
    z-index: 60;
  }
  #backButton {
    position: absolute;
    left: max(16px, env(safe-area-inset-left));
    top: max(16px, env(safe-area-inset-top));
    z-index: 52;
    pointer-events: auto;
  }

  /* Dialogue */
  #characterLayer {
    position: absolute;
    inset: 0;
    z-index: 35;
    pointer-events: none;
  }
  .character {
    position: absolute;
    bottom: 30px;
    width: min(82vh, 920px);
    height: min(98vh, 1080px);
    object-fit: contain;
    object-position: center bottom;
    transition: opacity .18s ease;
  }
  #mungCenter { left: 50%; transform: translateX(-50%); }
  #doguriLeft { left: max(-2vw); height: min(80vh, 1000px); bottom: 40px;}
  #mungRight { right: max(-4vw); height: min(100vh, 1000px); bottom: 5px;}

  #dialogueBlocker {
    position: absolute;
    inset: 0;
    z-index: 60;
    background: transparent;
  }
  #dialogueBox {
    position: absolute;
    left: 0;
    right: 0;
    bottom: -6px;
    min-height: calc(clamp(150px, 23vh, 250px) + clamp(22px, 3vh, 40px) + 24px);
    z-index: 65;
    background: rgba(0,0,0,.55);
    -webkit-backdrop-filter: blur(15px);
    backdrop-filter: blur(15px);
    border-top: 2px solid var(--line);
    padding: 22px clamp(24px, 5vw, 90px) max(28px, calc(env(safe-area-inset-bottom) + 22px));
  }
  #speakerName {
    font-size: clamp(28px, 3vw, 46px);
    font-weight: 800;
    margin-bottom: 10px;
  }
  #speakerName.doguri { color: var(--doguri); }
  #speakerName.mung { color: var(--mung); }
  #speakerName.unknown { color: #929292; }
  #dialogueText {
    font-size: clamp(22px, 2.4vw, 38px);
    line-height: 1.5;
    min-height: 1.5em;
    color: #fff;
  }
  #nextMark {
    position: absolute;
    right: clamp(18px, 5vw, 90px);
    bottom: max(26px, calc(env(safe-area-inset-bottom) + 22px));
    width: 46px;
    height: 46px;
    object-fit: contain;
    pointer-events: none;
    animation: bob .9s ease-in-out infinite;
  }
  @keyframes bob { 0%,100% { transform: translateX(0); } 50% { transform: translateX(3px); } }

  /* Dim, popup, choices */
  #dim {
    position: absolute;
    inset: 0;
    z-index: 40;
    background: rgba(0,0,0,.58);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
  }
  .popup {
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 50;
    transform: translate(-50%, -50%);
    width: min(88vw, 640px);
    max-height: 88vh;
    overflow: auto;
    background: rgba(0,0,0,.72);
    border-radius: var(--radius);
    padding: clamp(22px, 3.2vw, 42px);
  }
  .popup h2 {
    margin: 0 0 20px;
    font-size: clamp(26px, 3vw, 42px);
    text-align: center;
  }
  .popup p {
    margin: 12px 0;
    font-size: clamp(18px, 2vw, 28px);
    line-height: 1.55;
    text-align: center;
  }
  .choice-stack, .popup-actions {
    display: flex;
    gap: 14px;
  }
  .choice-stack { flex-direction: column; }
  .popup-actions {
    justify-content: center;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .choice-btn, .action-btn {
    min-height: 56px;
    padding: 13px 26px;
    border-radius: 18px;
    background: var(--ui);
    color: var(--uiText);
    font-weight: 800;
    font-size: clamp(18px, 2vw, 27px);
  }
  .choice-btn { width: 100%; }
  #cluePresentButton:disabled {
    opacity: .35;
    pointer-events: none;
    transform: none;
  }

  /* Toast */
  #toast {
    position: absolute;
    left: 50%;
    top: max(7vh, calc(env(safe-area-inset-top) + 22px));
    z-index: 90;
    transform: translateX(-50%) scale(.88);
    width: max-content;
    max-width: calc(100vw - 20px);
    padding: 14px 24px;
    border-radius: 18px;
    background: rgba(255,255,255,.96);
    color: #111;
    font-size: clamp(18px, 2vw, 28px);
    font-weight: 800;
    text-align: center;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transform-origin: center center;
    transition: opacity .18s cubic-bezier(.445, .05, .55, .95),
                transform .18s cubic-bezier(.445, .05, .55, .95);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) scale(1); }
  #toast.title-toast { z-index: 105; }
  #toast.score-change-toast {

  /* PC 게임 커서: 브라우저 기본 커서를 숨기고 리소스를 직접 따라다니게 한다. */

  let clearRevealTimers = [];
  let clearScoreRaf = null;

  let outgoingBgm = null;

  function playSfx(name) {

    try { a.currentTime = 0; a.play().catch(()=>{}); } catch(e) {}

  function cancelBgmTransition() {
    if (bgmTransitionRaf !== null) {
      cancelAnimationFrame(bgmTransitionRaf);
      bgmTransitionRaf = null;
    }
    if (outgoingBgm) {
      outgoingBgm.pause();
      outgoingBgm = null;
    }
    audio.bgm.volume = BGM_VOLUME;
  }

  function playBgm(name) {
    if (currentBgm === name && !audio.bgm.paused) return;
    cancelBgmTransition();
    currentBgm = name;
    audio.bgm.pause();
    audio.bgm.src = `bgm/${name}`;
    audio.bgm.currentTime = 0;
    audio.bgm.volume = BGM_VOLUME;

    // 탭이 숨겨졌거나 다른 앱/윈도우로 포커스가 이동했으면 BGM을 시작하지 않는다.
    if (document.hidden || !document.hasFocus()) {
      bgmResumeAfterVisibility = true;
      return;
    }

    bgmResumeAfterVisibility = false;
    audio.bgm.play().catch(()=>{});
  }

  function transitionBgm(name, duration = 700) {
    if (currentBgm === name && !audio.bgm.paused) return;
    cancelBgmTransition();

    // 탭이 숨겨졌거나 다른 앱/윈도우로 포커스가 이동했으면 크로스페이드도 재생하지 않는다.
    if (document.hidden || !document.hasFocus()) {
      currentBgm = name;
      audio.bgm.pause();
      audio.bgm.src = `bgm/${name}`;
      audio.bgm.currentTime = 0;
      audio.bgm.volume = BGM_VOLUME;
      bgmResumeAfterVisibility = true;
      return;
    }

    bgmResumeAfterVisibility = false;
    const from = audio.bgm;
    const fromStartVolume = from.paused ? 0 : from.volume;
    const to = new Audio(`bgm/${name}`);
    to.loop = true;
    to.volume = 0;

    audio.bgm = to;
    outgoingBgm = from;
    currentBgm = name;
    to.play().catch(()=>{});

    const startedAt = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - startedAt) / duration);
      const eased = 0.5 - Math.cos(Math.PI * t) / 2;
      from.volume = fromStartVolume * (1 - eased);
      to.volume = BGM_VOLUME * eased;

      if (t < 1) {
        bgmTransitionRaf = requestAnimationFrame(tick);
        return;
      }

      from.pause();
      from.volume = BGM_VOLUME;
      outgoingBgm = null;
      bgmTransitionRaf = null;
      to.volume = BGM_VOLUME;
    };
    bgmTransitionRaf = requestAnimationFrame(tick);
  }

  function stopBgm() {
    cancelBgmTransition();
    audio.bgm.pause();
    bgmResumeAfterVisibility = false;
    currentBgm = "";
  }

  function pauseBgmForBackground() {
    const wasPlaying = !audio.bgm.paused || Boolean(outgoingBgm && !outgoingBgm.paused);
    if (wasPlaying) bgmResumeAfterVisibility = true;
    cancelBgmTransition();
    audio.bgm.pause();
  }

  function resumeBgmFromBackground() {
    if (document.hidden || !document.hasFocus()) return;
    if (!bgmResumeAfterVisibility || !currentBgm) return;

    bgmResumeAfterVisibility = false;
    audio.bgm.volume = BGM_VOLUME;
    audio.bgm.play().catch(()=>{});
  }

  function handleVisibilityChange() {
    if (document.hidden) {
      saveState();
      pauseBgmForBackground();

    resumeBgmFromBackground();
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return defaultState();
      const parsed = JSON.parse(raw);
      const base = defaultState();
      const reasoningSchemaChanged = parsed.version !== base.version;
      const merged = Object.fromEntries(
        Object.keys(base).map(key => [key, Object.prototype.hasOwnProperty.call(parsed, key) ? parsed[key] : base[key]])
      );
      merged.version = base.version;
      if (!Array.isArray(merged.clues) || merged.clues.length !== 20) merged.clues = Array(20).fill(false);
      if (!Array.isArray(merged.hintRevealedClues) || merged.hintRevealedClues.length !== 20) {
        merged.hintRevealedClues = Array(20).fill(false);
      }
      merged.hintUseCount = Math.max(0, Number(merged.hintUseCount) || 0);
      if (!Array.isArray(merged.keywords)) merged.keywords = ["피해자","범인"];
      // 정답 빈칸 구조가 바뀐 버전에서는 이전 위치의 임시 배치를 불러오지 않는다.
      if (reasoningSchemaChanged || !Array.isArray(merged.reasoningDraft) || merged.reasoningDraft.length !== finalAnswers.length) {
        merged.reasoningDraft = Array(finalAnswers.length).fill("");
      }
      merged.wrongRebuttalCount = Math.max(0, Number(merged.wrongRebuttalCount) || 0);
      merged.wrongReasoningCount = Math.max(0, Number(merged.wrongReasoningCount) || 0);
      merged.strangeHatUnlocked = Boolean(merged.strangeHatUnlocked);
      merged.strangeHatOn = merged.strangeHatUnlocked && Boolean(merged.strangeHatOn);
      localStorage.setItem(SAVE_KEY, JSON.stringify(merged));
      return merged;
    } catch(e) {
      return defaultState();
    }
  }
  function getSortedKeywords(words = []) {
    return [...words].sort((a, b) => a.localeCompare(b, "ko-KR"));
  }

  function saveState() {
    if (state.runActive && timerBase !== null) {
      const now = performance.now();
      state.elapsedMs += now - timerBase;
      timerBase = now;
    }
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  }
  function startTimer() { timerBase = performance.now(); }
  function stopTimer() {
    if (timerBase !== null) {
      state.elapsedMs += performance.now() - timerBase;
      timerBase = null;
    }
  }
  function currentElapsed() {
    return state.elapsedMs + (timerBase !== null ? performance.now() - timerBase : 0);

    const fade = $("fade");
    const fadeOutWaitMs = useTrueEndingSlowFade ? 1400 : 700;

    fade.classList.toggle("true-ending-slow", useTrueEndingSlowFade);

    setTimeout(async () => {
      try {
        // 콜백이 이미지 로드/디코딩 Promise를 반환하면 완료될 때까지 검은 화면을 유지한다.
        await callback?.();
      } finally {
        // 새 장면이 실제로 한 프레임 그려진 뒤 페이드를 해제해 순간적인 깜박임을 막는다.
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            fade.classList.remove("on");
            if (useTrueEndingSlowFade) {
              // 느린 페이드인이 끝난 뒤 공통 페이드 시간으로 되돌린다.
              setTimeout(() => fade.classList.remove("true-ending-slow"), fadeInDurationMs + 50);
            }
          });
        });
      }
    }, fadeOutWaitMs);
  }

  function fitToastToViewport(el) {
    el.style.fontSize = "";
    el.style.paddingLeft = "";
    el.style.paddingRight = "";

    const availableWidth = Math.max(120, innerWidth - 20);
    const naturalWidth = el.scrollWidth;
    if (naturalWidth <= availableWidth) return;

    const computed = getComputedStyle(el);
    const baseFontSize = parseFloat(computed.fontSize) || 18;
    const basePaddingLeft = parseFloat(computed.paddingLeft) || 0;
    const basePaddingRight = parseFloat(computed.paddingRight) || 0;
    const scale = Math.max(0.55, availableWidth / naturalWidth);

    el.style.fontSize = `${Math.max(11, baseFontSize * scale)}px`;
    el.style.paddingLeft = `${Math.max(8, basePaddingLeft * scale)}px`;
    el.style.paddingRight = `${Math.max(8, basePaddingRight * scale)}px`;
  }

  function showToastContent(renderContent, duration=TOAST_DURATION_MS, playToastSound=true, showAboveTitle=false, isScoreChange=false) {
    clearTimeout(toastTimer);
    if (playToastSound) playSfx("toast");
    const el = $("toast");
    el.textContent = "";
    if (typeof renderContent === "function") renderContent(el);
    else el.textContent = String(renderContent);
    fitToastToViewport(el);
    el.classList.toggle("title-toast", showAboveTitle);
    el.classList.toggle("score-change-toast", isScoreChange);
    el.classList.add("show");
    toastTimer = setTimeout(() => {
      el.classList.remove("show");
      el.classList.remove("title-toast");
      el.classList.remove("score-change-toast");
    }, duration);
  }

  function showToast(text, duration=TOAST_DURATION_MS, playToastSound=true, showAboveTitle=false) {
    showToastContent(text, duration, playToastSound, showAboveTitle);
  }

  function showScoreChangeToast(amount, playToastSound=amount > 0) {
    showToastContent((el) => {
      el.append(document.createTextNode("추리력 "));
      const score = document.createElement("span");
      score.className = amount > 0 ? "toast-score-gain" : "toast-score-loss";
      score.textContent = amount > 0 ? `+${amount}` : String(amount);
      el.append(score);
    }, TOAST_DURATION_MS, playToastSound, false, true);
  }

  function hasFinalConsonant(text) {
    const chars = Array.from(String(text).trim());
    const lastChar = chars.at(-1) || "";
    const code = lastChar.charCodeAt(0);
    if (code < 0xAC00 || code > 0xD7A3) return false;
    return (code - 0xAC00) % 28 !== 0;
  }

  function notifyClueAcquired(idx) {
    const clue = clueData[idx];
    const quoted = clue.keywords.map(k => `「${k}」`).join(", ");
    const lastKeyword = clue.keywords.at(-1) || "";
    const particle = hasFinalConsonant(lastKeyword) ? "을" : "를";
    playSfx("found");
    showToast(`키워드 ${quoted}${particle} 획득했습니다.`, TOAST_DURATION_MS, false);
  }

  function notifyInvestigationCompleteIfNeeded() {
    if (state.clues.filter(Boolean).length !== 20) return;
    playSfx("correct");
    showToast("현장 조사 100% 완료!", TOAST_DURATION_MS, false);
  }

  function notifyClueAcquiredDelayed(idx, showInvestigationCompleteAfter = false, showScoreChange = state.strangeHatOn) {
    const delay = 250;
    const nextToastDelay = TOAST_DURATION_MS + TOAST_SEQUENCE_GAP_MS;

    setTimeout(() => {
      // 일반 안내 토스트를 먼저 표시하고, 추리력 증감 토스트는 항상 마지막에 표시한다.
      notifyClueAcquired(idx);

      if (showInvestigationCompleteAfter) {
        setTimeout(() => {
          notifyInvestigationCompleteIfNeeded();

          if (showScoreChange) {
            setTimeout(() => {
              showScoreChangeToast(3);
            }, nextToastDelay);
          }
        }, nextToastDelay);
      } else if (showScoreChange) {
        setTimeout(() => {
          showScoreChangeToast(3);
        }, nextToastDelay);
      }
    }, delay);
  }

  function updateMenuBadges() {
    $("noteBadge").classList.toggle("hidden", !state.noteUpdated);
    $("chatBadge").classList.toggle("hidden", !state.chatUpdated);
  }

  function setSceneVisible(on) {
    $("sceneViewport").classList.toggle("hidden", !on);
    $("mainUi").classList.toggle("hidden", !on);
  }

  function getGameCursorBaseSrc(target = null) {
    const targetElement = target instanceof Element ? target : null;
    const isInvestigatingScene =
      currentMode === "investigate" &&
      sceneViewportForCursor &&
      !sceneViewportForCursor.classList.contains("hidden") &&
      targetElement &&
      sceneViewportForCursor.contains(targetElement);

    return isInvestigatingScene
      ? "images/cursor_investigate.png"
      : "images/cursor_default.png";
  }

  function setGameCursorSrc(src) {
    if (!gameCursor || gameCursor.getAttribute("src") === src) return;
    gameCursor.setAttribute("src", src);
  }

  function updateGameCursorVisual(target = null) {
    if (!gameCursor || !gameCursorPointerMedia.matches) return;

    if (gameCursorPressed) {
      setGameCursorSrc("images/cursor_drag.png");
      return;
    }

    const resolvedTarget = target || document.elementFromPoint(gameCursorLastX, gameCursorLastY);
    setGameCursorSrc(getGameCursorBaseSrc(resolvedTarget));
  }

  function renderGameCursor() {
    gameCursorMoveRaf = null;
    if (!gameCursor || !gameCursorPointerMedia.matches) return;

    gameCursor.style.transform =
      `translate3d(${gameCursorLastX}px, ${gameCursorLastY}px, 0) translate(-50%, -50%)`;
    if (gameCursor.style.opacity !== "1") gameCursor.style.opacity = "1";
    updateGameCursorVisual(gameCursorPendingTarget);
    gameCursorPendingTarget = null;
  }

  function moveGameCursor(e) {
    if (e.pointerType && e.pointerType !== "mouse") return;
    if (!gameCursor || !gameCursorPointerMedia.matches) return;

    gameCursorLastX = e.clientX;
    gameCursorLastY = e.clientY;
    gameCursorPendingTarget = e.target instanceof Element ? e.target : null;

    if (gameCursorMoveRaf === null) {
      gameCursorMoveRaf = requestAnimationFrame(renderGameCursor);
    }
  }

  function hideGameCursor() {
    if (gameCursorMoveRaf !== null) {
      cancelAnimationFrame(gameCursorMoveRaf);
      gameCursorMoveRaf = null;
    }
    gameCursorPendingTarget = null;
    if (gameCursor) gameCursor.style.opacity = "0";
  }

  function pressGameCursor(e) {
    if (e.pointerType && e.pointerType !== "mouse") return;
    clearTimeout(gameCursorReleaseTimer);
    gameCursorReleaseTimer = null;
    gameCursorPressed = true;
    gameCursorPressedAt = performance.now();
    setGameCursorSrc("images/cursor_drag.png");
  }

  function releaseGameCursor(e) {
    if (e.pointerType && e.pointerType !== "mouse") return;
    const elapsed = performance.now() - gameCursorPressedAt;
    const remaining = Math.max(0, GAME_CURSOR_MIN_PRESS_MS - elapsed);

    clearTimeout(gameCursorReleaseTimer);
    gameCursorReleaseTimer = setTimeout(() => {
      gameCursorPressed = false;
      gameCursorReleaseTimer = null;
      updateGameCursorVisual();
    }, remaining);
  }

  function setMode(mode) {
    const normalPlay = mode === "base" || mode === "investigate";
    currentMode = normalPlay ? "investigate" : mode;
    $("bottomBar").classList.toggle("hidden", !normalPlay);
    $("backButton").classList.add("hidden");
    $("settingsButton").classList.toggle("hidden", !normalPlay);
    $("sceneViewport").classList.toggle("cursor-investigate", normalPlay);
    $("sceneViewport").classList.remove("cursor-drag");
    updateHotspots();
    clampPan();
    updateGameCursorVisual();
  }

  function syncStartSubtitleToTitleImage() {
    const title = $("startTitle");
    const group = $("startTitleGroup");
    if (!title || !group) return;

    const rect = title.getBoundingClientRect();
    if (rect.width <= 0 || rect.height <= 0) return;

    // object-fit: contain으로 실제 화면에 보이는 title.png의 가로 길이를 계산한다.
    let renderedTitleWidth = rect.width;
    if (title.naturalWidth > 0 && title.naturalHeight > 0) {
      const imageRatio = title.naturalWidth / title.naturalHeight;
      const boxRatio = rect.width / rect.height;
      renderedTitleWidth = boxRatio > imageRatio
        ? rect.height * imageRatio
        : rect.width;
    }

    group.style.setProperty("--title-image-width", `${renderedTitleWidth}px`);
  }

  function resizeScene() {
    const vw = innerWidth, vh = innerHeight;
    sceneScale = Math.max(vw / 1920, vh / 1080);
    const sw = 1920 * sceneScale;
    const sh = 1080 * sceneScale;
    baseOffsetX = (vw - sw) / 2;
    baseOffsetY = (vh - sh) / 2;
    clampPan();
  }
  function clampPan() {
    const overflowX = Math.max(0, 1920 * sceneScale - innerWidth);
    const overflowY = Math.max(0, 1080 * sceneScale - innerHeight);
    const maxPanX = overflowX / 2;
    const maxPanY = overflowY / 2;


    panX = Math.min(maxPanX, Math.max(-maxPanX, panX));
    panY = Math.min(maxPanY, Math.max(-maxPanY, panY));

    const x = baseOffsetX + panX;
    const y = baseOffsetY + panY;
    $("sceneInner").style.transform = `translate3d(${x}px, ${y}px, 0) scale(${sceneScale})`;
    updatePanArrows(maxPanX, maxPanY);
  }

  function updatePanArrows(maxPanX = Math.max(0, 1920 * sceneScale - innerWidth) / 2,
                           maxPanY = Math.max(0, 1080 * sceneScale - innerHeight) / 2) {
    const active = currentMode === "investigate" && !dialogueLocked;
    const epsilon = .5;
    $("panArrowW").classList.toggle("hidden", !active || maxPanX <= epsilon || panX >= maxPanX - epsilon);
    $("panArrowE").classList.toggle("hidden", !active || maxPanX <= epsilon || panX <= -maxPanX + epsilon);
    $("panArrowN").classList.toggle("hidden", !active || maxPanY <= epsilon || panY >= maxPanY - epsilon);
    $("panArrowS").classList.toggle("hidden", !active || maxPanY <= epsilon || panY <= -maxPanY + epsilon);
  }

  function buildHotspots() {
    const layer = $("hotspotLayer");
    layer.innerHTML = "";
    clueData.forEach((clue, idx) => {
      if (clue.special === "bird") return;
      const [x1,y1,x2,y2] = clue.rect;
      const b = document.createElement("button");
      b.className = "hotspot";
      b.dataset.index = idx;
      b.style.left = `${x1}px`;
      b.style.top = `${y1}px`;
      b.style.width = `${x2-x1}px`;
      b.style.height = `${y2-y1}px`;
      b.setAttribute("aria-label", clue.name);
      b.addEventListener("click", (e) => {
        e.stopPropagation();
        if (drag.moved) return;
        handleHotspot(idx);
      });
      layer.appendChild(b);
    });
    $("birdSprite").addEventListener("click", (e) => {
      e.stopPropagation();
      if (drag.moved) return;
      if (currentMode === "investigate" && birdVisible && !state.clues[13]) acquireClue(13);
    });
  }

  function updateHotspots() {
    document.querySelectorAll(".hotspot").forEach((el) => {
      const idx = Number(el.dataset.index);
      let active = currentMode === "investigate" && !dialogueLocked;
      if (idx === 0) active = active && state.windowOpen;
      el.style.pointerEvents = active ? "auto" : "none";
      el.style.zIndex = idx === 0 && state.windowOpen ? "2" : "1";
    });
    $("windowClosed").classList.toggle("hidden", state.windowOpen && !windowVisualDelayActive);
    if (state.windowOpen) scheduleBird();
    else stopBird();
    updatePanArrows();
  }

  function handleHotspot(idx) {
    if (currentMode !== "investigate" || dialogueLocked) return;
    const clue = clueData[idx];

    if (idx === 17) {
      if (state.windowOpen || (state.clues[17] && !state.clues[12])) {
        openDialogue([{speaker:"도구리", text:"이미 조사한 곳이야.", thought:true}], {mode:"first", onComplete:()=>setMode("investigate")});
      } else {
        handleWindow();
      }
      return;
    }
    if (state.clues[idx]) {
      openDialogue([{speaker:"도구리", text:"이미 조사한 곳이야.", thought:true}], {mode:"first", onComplete:()=>setMode("investigate")});
      return;
    }
    acquireClue(idx);
  }

  function acquireClue(idx) {
    const clue = clueData[idx];
    if (state.clues[idx]) return;

    state.clues[idx] = true;
    clue.keywords.forEach(k => {
      if (!state.keywords.includes(k)) state.keywords.push(k);
    });
    state.noteUpdated = true;
    const completedInvestigation = state.clues.every(Boolean);
    const showScoreChange = state.strangeHatOn;
    saveState();
    updateMenuBadges();

    playSfx("snap");
    showFoundCircle(idx);

    if (idx === 13) $("birdSprite").classList.remove("active");
    updateHotspots();

    const entries = clue.lines.map(line => ({ speaker:"도구리", text:line, thought:true }));
    openDialogue(entries, { mode:"first", onComplete:() => {
      if (idx === 12 && !state.windowOpen) updateHotspots();
      setMode("investigate");
      notifyClueAcquiredDelayed(idx, completedInvestigation, showScoreChange);
    }});
  }

  function showFoundCircle(idx) {
    const [x1,y1,x2,y2] = clueData[idx].rect;
    const mark = document.createElement("div");
    mark.className = "found-circle";
    mark.style.left = `${(x1+x2)/2}px`;
    mark.style.top = `${(y1+y2)/2}px`;
    $("sceneInner").appendChild(mark);
    setTimeout(() => mark.remove(), 3100);
  }

  function handleWindow() {
    const hasKey = state.clues[12];
    const newlyAcquiredWindow = !state.clues[17];
    const showScoreChange = state.strangeHatOn;
    let completedInvestigation = false;
    if (newlyAcquiredWindow) {
      state.clues[17] = true;
      if (!state.keywords.includes("창문")) state.keywords.push("창문");
      state.noteUpdated = true;
      completedInvestigation = state.clues.every(Boolean);
      saveState();
      updateMenuBadges();
      showFoundCircle(17);
      playSfx("snap");
    }

    if (hasKey) {
      openDialogue([
        {speaker:"도구리", text:"열쇠가 딱 맞네.", thought:true},
        {speaker:"도구리", text:"누군가 일부러 창문을 잠근 건가…?", thought:true}
      ], { mode:"first", onComplete:() => {
        playSfx("windowopen");
        windowVisualDelayActive = true;
        clearTimeout(windowClosedHideTimer);
        state.windowOpen = true;
        saveState();
        updateHotspots();
        setMode("investigate");
        windowClosedHideTimer = setTimeout(() => {
          windowVisualDelayActive = false;
          windowClosedHideTimer = null;
          updateHotspots();
        }, 250);
        if (newlyAcquiredWindow) notifyClueAcquiredDelayed(17, completedInvestigation, showScoreChange);
      }});
    } else {
      openDialogue([
        {speaker:"도구리", text:"창문은 안쪽에서 잠겨 있다.", thought:true},
        {speaker:"도구리", text:"열쇠 구멍이 있지만 열쇠는 보이지 않는다.", thought:true}
      ], { mode:"first", onComplete:() => {
        setMode("investigate");
        if (newlyAcquiredWindow) notifyClueAcquiredDelayed(17, completedInvestigation, showScoreChange);
      }});
    }
  }

  function stopBird() {
    clearTimeout(birdTimeout);
    clearInterval(birdFrameTimer);
    birdTimeout = null;
    birdVisible = false;
    $("birdSprite").style.opacity = 0;
    $("birdSprite").style.transform = "translate(-40px, -40px) scale(0)";
    $("birdSprite").classList.remove("active");
  }

  function scheduleBird() {
    if (!state.windowOpen || birdTimeout || birdVisible) return;
    birdTimeout = setTimeout(() => {
      birdTimeout = null;
      runBirdSequence();
    }, BIRD_APPEAR_INTERVAL_MS);
  }

  function setBirdFrame(frame) {
    const col = frame % 4;
    const row = Math.floor(frame / 4);
    $("birdSprite").style.backgroundPosition = `${col * 100 / 3}% ${row * 100 / 3}%`;
  }

  function easeOutSine(t) { return Math.sin((t * Math.PI) / 2); }
  function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }

  function tweenBird(duration, fromScale, toScale, fromX, toX, fromY, toY, easing, frameFn, done) {
    const start = performance.now();
    function tick(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = easing(t);
      const scale = fromScale + (toScale - fromScale) * eased;
      const x = fromX + (toX - fromX) * eased;
      const y = fromY + (toY - fromY) * eased;
      $("birdSprite").style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
      frameFn?.(now-start);
      if (t < 1 && birdVisible) requestAnimationFrame(tick);
      else done?.();
    }
    requestAnimationFrame(tick);
  }

  function runBirdSequence() {
    if (!state.windowOpen) return;
    birdVisible = true;
    const bird = $("birdSprite");
    bird.style.opacity = 1;
    bird.classList.toggle("active", !state.clues[13]);

    let flip = 0;
    tweenBird(750, 0, 1, -40, 0, -120, 0, easeOutSine, (elapsed) => {
      const frame = Math.floor(elapsed / 150) % 2;
      if (frame !== flip) flip = frame;
      setBirdFrame(frame);
    }, () => {
      const sequence = [
        [2,100],[3,100],[4,100],
        [5,500],
        [6,350],
        [7,1500],
        [8,100],[9,100],[10,100],[11,100],[12,100],[13,100]
      ];
      let pos = 0;
      const playNext = () => {
        if (!birdVisible) return;
        if (pos >= sequence.length) {
          const outStart = performance.now();
          tweenBird(1000, 1, 0, 0, 40, 0, -100, easeOutSine, (elapsed) => {
            setBirdFrame(14 + (Math.floor(elapsed / 100) % 2));
          }, () => {
            birdVisible = false;
            bird.classList.remove("active");
            bird.style.opacity = 0;
            scheduleBird();
          });
          return;
        }
        const [frame, dur] = sequence[pos++];
        setBirdFrame(frame);
        setTimeout(playNext, dur);
      };
      playNext();
    });
  }

  function openDialogue(entries, options={}) {
    dialogueLocked = true;
    dialogue = {
      entries: entries.flatMap(entry => {
        const lines = String(entry.text).split("\n");
        return lines.map(line => ({...entry, text:line}));
      }),
      index: 0,
      mode: options.mode || "first",
      onComplete: options.onComplete || null
    };
    $("dialogueBlocker").classList.remove("hidden");
    $("dialogueBox").classList.remove("hidden");
    $("backButton").classList.add("hidden");
    $("characterLayer").classList.toggle("hidden", dialogue.mode === "ending");
    showDialogueLine();
    updateHotspots();
  }

  function showDialogueLine() {
    const item = dialogue.entries[dialogue.index];
    const isDoguri = item.speaker === "도구리";
    const isUnknown = item.speaker === "???";
    const speakerClass = isDoguri ? "doguri" : isUnknown ? "unknown" : "mung";
    $("speakerName").textContent = item.speaker;
    $("speakerName").className = speakerClass;
    $("dialogueText").textContent = item.text;
    $("dialogueText").className = `${item.thought ? "thought " : ""}${speakerClass}`.trim();
    $("nextMark").classList.remove("hidden");

    ["mungCenter","doguriLeft","mungRight"].forEach(id => $(id).classList.add("hidden"));
    if (dialogue.mode === "ending") return;

    if (dialogue.mode === "first") {
      if (!isDoguri) $("mungCenter").classList.remove("hidden");
    } else {
      if (isDoguri) $("doguriLeft").classList.remove("hidden");
      else $("mungRight").classList.remove("hidden");
    }
  }

  function advanceDialogue() {
    if (!dialogueLocked || !dialogue) return;
    playSfx("next");
    dialogue.index++;
    if (dialogue.index < dialogue.entries.length) {
      showDialogueLine();
      return;
    }
    const cb = dialogue.onComplete;
    closeDialogue();
    cb?.();
  }

  function closeDialogue() {
    dialogueLocked = false;
    dialogue = null;
    $("dialogueBlocker").classList.add("hidden");
    $("dialogueBox").classList.add("hidden");
    $("characterLayer").classList.add("hidden");
    ["mungCenter","doguriLeft","mungRight"].forEach(id => $(id).classList.add("hidden"));
    $("backButton").classList.add("hidden");
    updateHotspots();
  }

    $("cluePopup").classList.remove("hidden");

    if (mode === "present") {
      showToast("단서를 선택해서 제시하자.", TOAST_DURATION_MS, false);
    }
  }

  function selectClue(idx) {
    if (!state.clues[idx]) {
      playSfx("cancel");
      showToast("아직 찾지 못한 단서입니다.", TOAST_DURATION_MS, false);
      return;
    }
    playSfx("flick");
    selectedClue = idx;
    updateClueSelection();
    if (cluePopupMode !== "present") {
      openDialogue(clueData[idx].lines.map(text => ({speaker:"도구리", text, thought:true})), {mode:"first", onComplete:()=>{}});
    }
  }

  function updateClueSelection() {
    document.querySelectorAll(".clue-cell").forEach((el, i) => el.classList.toggle("selected", i === selectedClue));
    $("cluePresentButton").disabled = cluePopupMode === "present" && selectedClue === null;
  }

  function closeCluePopup(resumeGameBgm = true) {
    if (dialogueLocked) closeDialogue();
    $("cluePopup").classList.add("hidden");
    $("dim").classList.add("hidden");
    selectedClue = null;
    if (resumeGameBgm) playBgm("bgm_game.mp3");
  }

  function startRebuttal() {
    if (state.rebuttalStage >= 5) return startFinalLeadIn();
    setMode("conversation");
    const stage = rebuttals[state.rebuttalStage];
    openDialogue(stage.claim.map(text => ({speaker:"멍반장", text})), {
      mode:"third",
      onComplete:() => showChoice([
        {label:"지금 반박한다", action:beginObjection},
        {label:"조금 더 조사한다", cancel:true, action:returnToBase}
      ])
    });
  }

  function beginObjection() {
    transitionBgm("bgm_finalclue.mp3", 700);
    openCluePopup("present");
  }

  function submitEvidence() {
    if (selectedClue === null) return;
    const submittedClue = selectedClue;
    const stage = rebuttals[state.rebuttalStage];
    const correct = stage.correct.includes(submittedClue);
    closeCluePopup(false);

    if (!correct) {
      state.wrongRebuttalCount++;
      saveState();
      stopBgm();
      playSfx("wrong");
      if (state.strangeHatOn) showScoreChangeToast(-3);
      openDialogue([
        {speaker:"멍반장", text:"그건 아닌 것 같습니다."},
        {speaker:"멍반장", text:"왜 아닌지는… 조금만 더 생각해보겠습니다."}
      ], {mode:"third", onComplete:returnToBase});
      return;
    }

    clearTimeout(objectionBgmTimer);
      objectionBgmTimer = null;
      playBgm("bgm_objection.mp3");
    const response = stage.response(submittedClue);
    openDialogue(response, {mode:"third", onComplete:() => {
      state.rebuttalStage++;
      state.chatUpdated = true;
      saveState();
      updateMenuBadges();
      returnToBase(true);
    }});
  }

  function returnToBase(useBgmTransition = false) {
    clearTimeout(objectionBgmTimer);
    objectionBgmTimer = null;
    closeAllPopups();
    setMode("base");
    if (useBgmTransition) transitionBgm("bgm_game.mp3", 700);
    else playBgm("bgm_game.mp3");
    updateHotspots();
  }

  function startFinalLeadIn() {
    setMode("conversation");
    openDialogue([
      {speaker:"멍반장", text:"이쯤 되면 저도 압니다."},
      {speaker:"멍반장", text:"제가 뭔가 모른다는 걸요."}
    ], {mode:"third", onComplete:() => showChoice([
      {label:"추리를 완성한다", action:startReasoning},
      {label:"조금 더 조사한다", cancel:true, action:returnToBase}
    ])});
  }

  function startReasoning() {
    openReasoningPopup();
  }

  function openReasoningPopup() {
    transitionBgm("bgm_finalclue.mp3", 700);
    reasoningSlots = Array.isArray(state.reasoningDraft) && state.reasoningDraft.length === finalAnswers.length
      ? state.reasoningDraft.slice()
      : Array(finalAnswers.length).fill("");
    selectedKeyword = null;
    renderReasoning();
    $("dim").classList.remove("hidden");
    $("reasoningPopup").classList.remove("hidden");
    requestAnimationFrame(fitReasoningContentToViewport);
  }

  function fitReasoningContentToViewport() {
    const popup = $("reasoningPopup");
    if (!popup || popup.classList.contains("hidden")) return;

    const viewport = $("reasoningContentViewport");
    const content = $("reasoningContent");
    const actions = popup.querySelector(".popup-actions");
    if (!viewport || !content || !actions) return;

    content.style.transform = "scale(1)";
    viewport.style.height = "auto";

    const contentHeight = content.scrollHeight;
    const popupStyle = getComputedStyle(popup);
    const actionsStyle = getComputedStyle(actions);
    const paddingTop = parseFloat(popupStyle.paddingTop) || 0;
    const paddingBottom = parseFloat(popupStyle.paddingBottom) || 0;
    const actionsMarginTop = parseFloat(actionsStyle.marginTop) || 0;
    const actionsHeight = actions.offsetHeight + actionsMarginTop;
    const viewportRatio = innerWidth <= 700 ? 0.96 : 0.92;
    const maxPopupHeight = innerHeight * viewportRatio;
    const availableContentHeight = Math.max(
      120,
      maxPopupHeight - paddingTop - paddingBottom - actionsHeight
    );
    const scale = Math.min(1, availableContentHeight / Math.max(1, contentHeight));

    content.style.transform = `scale(${scale})`;
    viewport.style.height = `${Math.ceil(contentHeight * scale)}px`;
  }

  function createKeywordDragPreview(chip) {
    const preview = document.createElement("div");
    preview.className = "keyword-drag-preview";
    // 마우스/터치/펜 모두 포인터 좌표와 미리보기 중심을 정확히 맞춘다.
    preview.style.transform = "translate(-50%, -50%)";
    const previewChip = chip.cloneNode(true);
    previewChip.classList.add("selected");
    preview.appendChild(previewChip);
    // #app은 position: fixed로 별도 stacking context를 만든다.
    // 프리뷰를 body에 붙이면 #app 내부의 게임 커서보다 위에 표시될 수 있으므로
    // 게임 커서와 같은 stacking context인 #app 안에 추가한다.
    const previewParent = $("app") || document.body;
    previewParent.appendChild(preview);
    return preview;
  }

  function startKeywordPointerDrag(e, chip, word) {
    // 브라우저 기본 HTML5 drag/drop은 PC에서 운영체제 커서를 다시 표시할 수 있다.
    // 마우스/터치/펜 모두 Pointer Events로 통일해 게임 커서만 유지한다.
    if (e.pointerType === "mouse" && e.button !== 0) return;

    keywordPointerDrag = {
      pointerId: e.pointerId,
      chip,
      word,
      startX: e.clientX,
      startY: e.clientY,
      moved: false,
      preview: null
    };
    chip.setPointerCapture?.(e.pointerId);
  }

  function moveKeywordPointerDrag(e) {
    const dragInfo = keywordPointerDrag;
    if (!dragInfo || e.pointerId !== dragInfo.pointerId) return;

    const dx = e.clientX - dragInfo.startX;
    const dy = e.clientY - dragInfo.startY;
    if (!dragInfo.moved && Math.hypot(dx, dy) <= 8) return;

    if (!dragInfo.moved) {
      dragInfo.moved = true;
      suppressKeywordClick = true;
      selectedKeyword = dragInfo.word;
      updateKeywordSelection();
      dragInfo.preview = createKeywordDragPreview(dragInfo.chip);
    }

    e.preventDefault();
    dragInfo.preview.style.left = `${e.clientX}px`;
    dragInfo.preview.style.top = `${e.clientY}px`;
  }

  function finishKeywordPointerDrag(e, cancelled = false) {
    const dragInfo = keywordPointerDrag;
    if (!dragInfo || e.pointerId !== dragInfo.pointerId) return;

    keywordPointerDrag = null;
    if (dragInfo.chip.hasPointerCapture?.(e.pointerId)) {
      dragInfo.chip.releasePointerCapture?.(e.pointerId);
    }
    dragInfo.preview?.remove();

    if (dragInfo.moved) {
      e.preventDefault();
      if (!cancelled) {
        const target = document.elementFromPoint(e.clientX, e.clientY)?.closest?.(".blank-slot");
        if (target && $("reasoningPopup").contains(target)) {
          const slotIndex = Number(target.dataset.slot);
          if (Number.isInteger(slotIndex)) {
            reasoningSlots[slotIndex] = dragInfo.word;
            selectedKeyword = null;
            playSfx("flick");
            renderReasoning();
          }
        }
      }

      setTimeout(() => {
        suppressKeywordClick = false;
        if (selectedKeyword === dragInfo.word) {
          selectedKeyword = null;
          updateKeywordSelection();
        }
      }, 0);
    }
  }

  function renderReasoning() {
    const container = $("reasoningText");
    container.innerHTML = "";

    const lines = [
      ["피해자는 ", 0, " 때문에 넘어진 것이 아니다."],
      ["머리의 ", 1, "과 바닥의 ", 2, "은 ", 3, "처럼 보이게 하려는 ", 4, "이다."],
      ["진짜 ", 5, "은 몸에 난 깊고 좁은 ", 6, "."],
      [7, "은 흉기를 남기지 않기 위해 ", 8, " 위에 올라가, 창밖 처마의 ", 9, "을 꺾어 ", 10, "를 찔렀다."],
      ["그리고 ", 11, "을 잠근 뒤, ", 12, "를 숨겼다."],
      ["창밖의 눈에 ", 13, "을 남기지 않기 위해, 잠금 장치를 누른 뒤 ", 14, "으로 나갔다."]
    ];

    lines.forEach(parts => {
      const div = document.createElement("div");
      parts.forEach(part => {
        if (typeof part === "number") div.appendChild(makeSlot(part));
        else div.appendChild(document.createTextNode(part));
      });
      container.appendChild(div);
    });

    const bank = $("keywordBank");
    bank.innerHTML = "";

    // 한 키워드는 한 번만 사용한다. 빈칸에 배치된 즉시 하단 키워드 목록에서 사라진다.
    const usedKeywords = new Set(reasoningSlots.filter(Boolean));

    getSortedKeywords(state.keywords).forEach(word => {
      if (usedKeywords.has(word)) return;

      const chip = document.createElement("button");
      chip.className = "keyword-chip";
      chip.textContent = word;
      // 네이티브 드래그를 끄고 커스텀 Pointer Events 드래그만 사용한다.
      chip.draggable = false;
      chip.addEventListener("pointerdown", (e) => startKeywordPointerDrag(e, chip, word));
      chip.addEventListener("click", () => {
        if (suppressKeywordClick) return;
        playSfx("flick");
        selectedKeyword = selectedKeyword === word ? null : word;
        updateKeywordSelection();
      });
      bank.appendChild(chip);
    });
    updateKeywordSelection();
    updateReasoningConfirmState();
    if (!$("reasoningPopup").classList.contains("hidden")) {
      requestAnimationFrame(fitReasoningContentToViewport);
    }
  }

  function hasUniqueReasoningKeywords() {
    const filled = reasoningSlots.filter(Boolean);
    return new Set(filled).size === filled.length;
  }

  function updateReasoningConfirmState() {
    $("reasoningConfirm").disabled = !reasoningSlots.every(Boolean) || !hasUniqueReasoningKeywords();
  }

  function makeSlot(idx) {
    const slot = document.createElement("button");
    slot.className = "blank-slot";
    slot.dataset.slot = idx;
    slot.textContent = reasoningSlots[idx] || "";
    slot.addEventListener("click", () => {
      if (selectedKeyword) {
        reasoningSlots[idx] = selectedKeyword;
        playSfx("flick");
        selectedKeyword = null;
        renderReasoning();
      } else if (reasoningSlots[idx]) {
        reasoningSlots[idx] = "";
        renderReasoning();
      }
    });
    return slot;
  }

  function updateKeywordSelection() {
    document.querySelectorAll(".keyword-chip").forEach(el => el.classList.toggle("selected", el.textContent === selectedKeyword));
  }

  function cancelReasoning(useBgmTransition = true) {
    state.reasoningDraft = reasoningSlots.slice();
    saveState();
    $("reasoningPopup").classList.add("hidden");
    $("dim").classList.add("hidden");
    returnToBase(useBgmTransition);
  }

  function submitReasoning() {
    if (!reasoningSlots.every(Boolean) || !hasUniqueReasoningKeywords()) return;
    const correct = finalAcceptedAnswers.every((options, i) => options.includes(reasoningSlots[i]));
    $("reasoningPopup").classList.add("hidden");
    $("dim").classList.add("hidden");

    if (!correct) {
      state.wrongReasoningCount++;
      state.reasoningDraft = reasoningSlots.slice();
      saveState();
      transitionBgm("bgm_game.mp3", 700);
      playSfx("wrong");
      if (state.strangeHatOn) showScoreChangeToast(-5);
      openDialogue([
        {speaker:"멍반장", text:"뭔가 놓친 것 같습니다."},
        {speaker:"멍반장", text:"하지만 뭘 놓쳤는지는 놓쳤습니다."}
      ], {mode:"third", onComplete:returnToBase});
      return;
    }

    state.reasoningDraft = Array(finalAnswers.length).fill("");
    playSfx("correct");
    completeGame();
  }

  function completeGame() {
    stopTimer();
    state.finalTimeMs = state.elapsedMs;
    state.runActive = false;
    state.completed = true;
    saveState();
    transitionBgm("bgm_peace.mp3", 700);

    setTimeout(() => {
      openDialogue([
        {speaker:"도구리", text:"이건 단순한 사고가 아니에요."},
        {speaker:"도구리", text:"피해자는 누군가에게 살해당한 거예요."},
        {speaker:"멍반장", text:"사고사가 아니라… 제가 사고를 칠 뻔했네요."}
      ], {mode:"third", onComplete:showClearPopup});
    }, 450);
  }

  function buildDirectionalSnow(layer, direction = -1) {
    if (!layer || layer.childElementCount > 0) return;

    const pieceCount = 168;
    const pathRatios = [.16, .33, .5, .67, .84];
    const driftDirection = direction < 0 ? -1 : 1;

    for (let i = 0; i < pieceCount; i++) {
      const flake = document.createElement("span");
      flake.className = "title-snowflake";

      const depth = Math.random();
      const size = 3.4 + depth * 7.2;
      const flakeW = size * (1.12 + Math.random() * .48);
      const flakeH = size * (.84 + Math.random() * .22);
      const duration = 1800 + (1 - depth) * 2600 + Math.random() * 900;
      const delay = -Math.random() * duration;
      const driftX = driftDirection * (58 + depth * 52 + Math.random() * 82);
      const fallY = 116 + Math.random() * 42;
      const startY = -10 - Math.random() * 24;
      const alpha = 0.44 + depth * 0.5;
      const blur = depth < .18 ? 1.6 : depth < .45 ? .9 : depth < .72 ? .35 : 0;

      // 눈발의 긴 축이 실제 이동 방향을 바라보도록 화면 비율까지 반영한다.
      const driftPx = driftX * innerWidth / 100;
      const fallPx = fallY * innerHeight / 100;
      const flightAngle = Math.atan2(fallPx, driftPx) * 180 / Math.PI;
      const anglePhase = Math.random() * Math.PI * 2;

      // 궤적 노이즈를 더 키워 눈보라가 조금 거칠게 흔들리도록 만든다.
      const noiseX = .8 + depth * 1.9 + Math.random() * .85;
      const noiseY = .28 + depth * .95 + Math.random() * .4;
      const noiseCycles = 1.2 + Math.random() * 1.25;
      const noisePhase = Math.random() * Math.PI * 2;

      pathRatios.forEach((ratio, index) => {
        const phase = noisePhase + ratio * Math.PI * 2 * noiseCycles;
        const gust = Math.sin(phase) * noiseX + Math.sin(phase * 2.35 + depth * 5.1) * noiseX * .32;
        const sway = Math.cos(phase * .92) * noiseY + Math.sin(phase * 1.78 + 1.3) * noiseY * .28;
        const x = driftX * ratio + gust;
        const y = fallY * ratio + sway;
        const rot = flightAngle + Math.sin(anglePhase + ratio * Math.PI * 2) * 5.2;

        flake.style.setProperty(`--path-x${index + 1}`, `${x.toFixed(2)}vw`);
        flake.style.setProperty(`--path-y${index + 1}`, `${y.toFixed(2)}vh`);
        flake.style.setProperty(`--rot-${index + 1}`, `${rot.toFixed(2)}deg`);
      });

      // 진행 방향 반대편 바깥에서도 생성해 화면 가장자리가 비지 않도록 한다.
      const driftAbs = Math.abs(driftX);
      const startX = driftDirection < 0
        ? -14 + Math.random() * (122 + driftAbs)
        : -14 - driftAbs + Math.random() * (122 + driftAbs);
      flake.style.setProperty("--x", `${startX.toFixed(2)}vw`);
      flake.style.setProperty("--start-y", `${startY.toFixed(2)}vh`);
      flake.style.setProperty("--flake-w", `${flakeW.toFixed(2)}px`);
      flake.style.setProperty("--flake-h", `${flakeH.toFixed(2)}px`);
      flake.style.setProperty("--alpha", alpha.toFixed(2));
      flake.style.setProperty("--blur", `${blur.toFixed(2)}px`);
      flake.style.setProperty("--duration", `${duration.toFixed(0)}ms`);
      flake.style.setProperty("--delay", `${delay.toFixed(0)}ms`);
      flake.style.setProperty("--drift-x", `${driftX.toFixed(2)}vw`);
      flake.style.setProperty("--fall-y", `${fallY.toFixed(2)}vh`);
      flake.style.setProperty("--rot-0", `${flightAngle.toFixed(2)}deg`);
      flake.style.setProperty("--rot-6", `${flightAngle.toFixed(2)}deg`);
      layer.appendChild(flake);
    }
  }

  function buildTitleSnow() {
    buildDirectionalSnow($("startSnow"), -1);
  }

  function buildEndingSnow() {
    buildDirectionalSnow($("endingSnow"), 1);
  }

  function formatClearTime(ms) {
    const totalMinutes = Math.max(0, Math.floor(ms / 60000));
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    return hours > 0 ? `${hours}시간 ${minutes}분` : `${totalMinutes}분`;
  }

  function calculateDeductionScore() {
    const missingClues = 20 - state.clues.filter(Boolean).length;
    const score = 100
      - missingClues * 3
      - state.wrongRebuttalCount * 3
      - state.wrongReasoningCount * 5
      - state.hintUseCount;
    return Math.max(0, score);
  }

  function stopClearResultAnimations() {
    clearRevealTimers.forEach(clearTimeout);
    clearRevealTimers = [];
    if (clearScoreRaf !== null) {
      cancelAnimationFrame(clearScoreRaf);
      clearScoreRaf = null;
    }
    clearTimeout(clearConfettiTimer);
    clearConfettiTimer = null;
    const confettiLayer = $("clearConfettiLayer");
    if (confettiLayer) confettiLayer.innerHTML = "";
  }

  function playClearConfetti(isPerfect = false) {
    const layer = $("clearConfettiLayer");
    if (!layer) return;

    clearTimeout(clearConfettiTimer);
    layer.innerHTML = "";

    const colors = isPerfect
      ? ["#fff7c7", "#ffe27a", "#ffc846", "#e8a91f", "#c98a12"]
      : ["#02a3f4", "#7dbb02", "#ffbc03", "#f95414"];

    const pieceCount = isPerfect ? 42 : 30;

    for (let i = 0; i < pieceCount; i++) {
      const piece = document.createElement("span");
      piece.className = "clear-confetti";

      const width = 7 + Math.random() * 17;
      const height = 10 + Math.random() * 30;
      const drift = -180 + Math.random() * 360;
      const spin = 360 + Math.random() * 1080;
      const duration = 12000 + Math.random() * 5000;
      const delay = Math.random() * 4500;
      const startY = -35 + Math.random() * 15;
      const endY = 125 + Math.random() * 20;
      const laneX = ((i + 0.5) / pieceCount) * 100;
      const jitterX = -1.2 + Math.random() * 2.4;

      piece.style.setProperty("--x", `${Math.max(0, Math.min(100, laneX + jitterX)).toFixed(2)}%`);
      piece.style.setProperty("--w", `${width.toFixed(1)}px`);
      piece.style.setProperty("--h", `${height.toFixed(1)}px`);
      piece.style.setProperty("--color", colors[Math.floor(Math.random() * colors.length)]);
      piece.style.setProperty("--drift", `${drift.toFixed(0)}px`);
      piece.style.setProperty("--spin", `${spin.toFixed(0)}deg`);
      piece.style.setProperty("--duration", `${duration.toFixed(0)}ms`);
      piece.style.setProperty("--delay", `${delay.toFixed(0)}ms`);
      piece.style.setProperty("--start-y", `${startY.toFixed(1)}vh`);
      piece.style.setProperty("--end-y", `${endY.toFixed(1)}vh`);
      layer.appendChild(piece);
    }

    clearConfettiTimer = setTimeout(() => {
      layer.innerHTML = "";
      clearConfettiTimer = null;
    }, 22500);
  }

  function animateDeductionScore(target, duration = 3000, onComplete = null) {
    const el = $("clearScoreValue");
    const startedAt = performance.now();
    let clear100Played = false;
    el.textContent = "0";

    const tick = (now) => {
      const t = Math.min(1, (now - startedAt) / duration);
      const eased = 1 - Math.pow(1 - t, 4);
      const displayedScore = Math.round(target * eased);
      el.textContent = String(displayedScore);

      if (target === 100 && displayedScore === 100 && !clear100Played) {
        clear100Played = true;
        const clear100Timer = setTimeout(() => {
          playSfx("clear100");
        }, CLEAR_100_SFX_DELAY);
        clearRevealTimers.push(clear100Timer);
      }

      if (t < 1) {
        clearScoreRaf = requestAnimationFrame(tick);
      } else {
        clearScoreRaf = null;
        el.textContent = String(target);
        onComplete?.();
      }
    };
    clearScoreRaf = requestAnimationFrame(tick);
  }

  function scheduleClearReveal(id, delay, callback) {
    const timer = setTimeout(() => {
      $(id).classList.add("show");
      callback?.();
    }, delay);
    clearRevealTimers.push(timer);
  }

  function getClearComment(score) {
    if (score >= 95) return "완벽하군요. 역시 제 조수답습니다.";
    if (score >= 85) return "훌륭합니다. 거의 제가 추리한 것 같군요.";
    if (score >= 75) return "좋은 추리였습니다. 몇 군데는 눈감아 드리죠.";
    if (score >= 65) return "제법입니다. 저와 비슷한 수준이군요.";
    if (score >= 50) return "조금 아쉽군요. 그래도 사건은 해결됐습니다.";
    return "…사건은 해결됐으니, 자세한 건 묻지 맙시다.";
  }

  function fitClearCommentToBubble() {
    const bubble = $("clearCommentBubble");
    const text = $("clearCommentText");
    if (!bubble || !text || isVisible("clearPopup") === false) return;

    // 먼저 기본 글자 크기로 되돌린 뒤, 현재 말풍선의 실제 안쪽 폭에 맞춰 축소한다.
    bubble.style.fontSize = "";

    const computed = getComputedStyle(bubble);
    const baseFontSize = parseFloat(computed.fontSize) || 18;
    const paddingLeft = parseFloat(computed.paddingLeft) || 0;
    const paddingRight = parseFloat(computed.paddingRight) || 0;
    const availableWidth = Math.max(1, bubble.clientWidth - paddingLeft - paddingRight);

    for (let i = 0; i < 5; i++) {
      const textWidth = Math.max(text.scrollWidth, text.getBoundingClientRect().width);
      if (textWidth <= availableWidth + 0.5) break;

      const currentFontSize = parseFloat(getComputedStyle(bubble).fontSize) || baseFontSize;
      const nextFontSize = Math.max(8, currentFontSize * (availableWidth / textWidth) * 0.98);
      bubble.style.fontSize = `${nextFontSize}px`;
    }
  }

  function updateClearInfoScale() {
    const scaleWrap = $("clearInfoScale");
    const group = $("clearInfoGroup");
    const title = $("clearTitle");
    const actions = $("clearActions");
    const popup = $("clearPopup");
    if (!scaleWrap || !group || !title || !actions || !popup || isVisible("clearPopup") === false) return;

    // reveal 애니메이션의 translateY와 현재 scale을 무시하고,
    // 최종 레이아웃 기준 크기로 계산한다.
    const naturalHeight = Math.max(1, scaleWrap.offsetHeight);
    const groupRect = group.getBoundingClientRect();
    const popupRect = popup.getBoundingClientRect();
    const centerY = groupRect.top + groupRect.height / 2;
    const titleBottom = popupRect.top + title.offsetTop + title.offsetHeight;
    const actionsTop = popupRect.top + actions.offsetTop;
    const safety = 40;
    const topRoom = centerY - titleBottom - safety;
    const bottomRoom = actionsTop - centerY - safety;
    const availableHeight = Math.max(1, Math.min(topRoom, bottomRoom) * 2);
    const scale = Math.max(.52, Math.min(1, availableHeight / naturalHeight));

    scaleWrap.style.setProperty("--clear-info-scale", scale.toFixed(3));
  }

  function preloadTrueEndingImage(sceneNumber) {
    const src = TRUE_ENDING_BG_SOURCES[sceneNumber];
    if (!src) return Promise.resolve();
    if (trueEndingImagePreloads.has(src)) return trueEndingImagePreloads.get(src);

    const preloadPromise = new Promise(resolve => {
      const image = new Image();
      image.decoding = "async";
      let settled = false;

      const finish = async () => {
        if (settled) return;
        settled = true;
        try {
          if (typeof image.decode === "function") await image.decode();
        } catch (e) {}
        resolve();
      };

      image.addEventListener("load", finish, {once:true});
      image.addEventListener("error", finish, {once:true});
      image.src = src;
      if (image.complete) finish();
    });

    trueEndingImagePreloads.set(src, preloadPromise);
    return preloadPromise;
  }

  function getFinalAssignmentCapacity(words = []) {
    const availableWords = new Set(words);
    const slotOptions = finalAcceptedAnswers.map(options => options.filter(word => availableWords.has(word)));
    const matchedWordToSlot = new Map();

    function tryAssign(slotIndex, seenWords) {
      for (const word of slotOptions[slotIndex]) {
        if (seenWords.has(word)) continue;
        seenWords.add(word);

        const previousSlot = matchedWordToSlot.get(word);
        if (previousSlot === undefined || tryAssign(previousSlot, seenWords)) {
          matchedWordToSlot.set(word, slotIndex);
          return true;
        }
      }
      return false;
    }

    let matchedCount = 0;
    const slotOrder = slotOptions
      .map((options, slotIndex) => ({slotIndex, optionCount: options.length}))
      .sort((a, b) => a.optionCount - b.optionCount);

    slotOrder.forEach(({slotIndex}) => {
      if (tryAssign(slotIndex, new Set())) matchedCount++;
    });
    return matchedCount;
  }

  function canFillFinalReasoningWithKeywords(words = []) {
    return getFinalAssignmentCapacity(words) === finalAcceptedAnswers.length;
  }

  function getHelpfulMissingFinalWords(words = []) {
    const available = [...new Set(words)];
    const availableSet = new Set(available);
    const currentCapacity = getFinalAssignmentCapacity(available);
    const allAcceptedWords = [...new Set(finalAcceptedAnswers.flat())];

    return allAcceptedWords.filter(word =>
      !availableSet.has(word) &&
      getFinalAssignmentCapacity([...available, word]) > currentCapacity
    );
  }

  function hintText() {
    if (state.rebuttalStage >= 5) {
      const complete = canFillFinalReasoningWithKeywords(state.keywords);
      return complete ? "단서는 이제 충분합니다." : "아직 단서가 부족합니다.";
    }
    const correct = rebuttals[state.rebuttalStage].correct;
    const acquired = correct.find(idx => state.clues[idx]);
    return acquired === undefined ? "현장을 조사하세요." : "필요한 단서가 이미 있습니다.";
  }

  function revealOneHiddenClueName() {
    const hiddenMissing = clueData
      .map((_, idx) => idx)
      .filter(idx => !state.clues[idx] && !state.hintRevealedClues[idx]);

    if (hiddenMissing.length === 0) return null;

    let candidates = [];
    if (state.rebuttalStage < rebuttals.length) {
      candidates = rebuttals[state.rebuttalStage].correct
        .filter(idx => hiddenMissing.includes(idx));
    }

    if (candidates.length === 0 && state.rebuttalStage >= rebuttals.length) {
      const missingFinalWords = new Set(getHelpfulMissingFinalWords(state.keywords));
      candidates = hiddenMissing.filter(idx =>
        clueData[idx].keywords.some(keyword => missingFinalWords.has(keyword))
      );
    }

    const pool = candidates.length > 0 ? candidates : hiddenMissing;
    const idx = pool[Math.floor(Math.random() * pool.length)];
    state.hintRevealedClues[idx] = true;
    return idx;
  }
